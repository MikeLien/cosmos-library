uestion": "很多人明知中獎機率極低，還是會買樂透或下注，你覺得他們買的到底是那筆獎金，還是別的東西？下次看到有人在賭運氣時，留意你心裡浮出的第一個念頭。", "parent": {"context": "青少年已能處理機率與期望值的抽象概念，但人為什麼在「明知不划算」時仍然選擇下注，無法只靠數學回答——裡面有希望、刺激、想像、逃離。這張卡不教機率公式，也不評斷賭博對錯，而是邀請你把「人的選擇」當成一個比數字更耐人尋味的謎，去感覺理性與渴望之間那條模糊的線。", "extensions": ["如果有人說『反正只花一點點』，那一點點對不同處境的人來說，份量是一樣的嗎？", "除了金錢，生活裡還有哪些事，你明知機率不高卻還是想試試看？", "把『買的是希望』這個說法，跟你自己曾經抱著一線希望去做的某件事放在一起，看看像不像。"], "dont": ["別把這張卡變成『所以賭博是壞的、不要碰』的結論——那會關掉孩子原本想探索的好奇。", "別急著用期望值算式『證明』對方不理性，重點不是誰對，是去理解人為什麼這樣選。"]}, "source": {"type": "research-derived", "citation": "Kahneman, D., & Tversky, A. (1979). Prospect Theory: An Analysis of Decision under Risk. Econometrica, 47(2), 263-291."}, "tags": ["scaleup-13to18", "金錢與選擇", "風險與不確定", "機率直覺", "沈思題"], "language": "zh-Hant-TW"}, {"id": "MON0000010", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "金錢與選擇", "sub_category": "公平與分配", "question_type": "行動題", "action_icon": "eye", "question": "找一天到不同的地方走走——市場、商辦區、不同的街區，看看誰在做什麼工作、誰在等什麼，留意有些人擁有的明顯比別人多。回來時帶一個你還沒辦法回答的問題。", "parent": {"context": "青少年開始能跳出『個人努力決定一切』的單一框架，看見運氣、出身、結構這些更大的系統如何影響一個人手上有多少。這張卡不灌輸任何政治立場、不談稅該不該收，只是請你親眼去看真實的社會分布，讓『為什麼有人多有人少』這個問題自己浮現，而不是被別人的答案先填滿。〔執行前提〕白天、人多的公共場合進行，不靠近也不打擾任何人，只是觀察；若某個畫面讓你心裡很不舒服，可以先離開，或改成從新聞、紀錄片裡觀察。", "extensions": ["你看到的差距，有多少看起來像是『努力的結果』，有多少更像是『出生的起點』？", "如果同一個人換到另一個街區、另一個家庭長大，他手上的東西會一樣嗎？", "把『公平』這個詞拆開看：是每個人拿到一樣多算公平，還是每個人有一樣的機會算公平？"], "dont": ["別在出門前就先給孩子一個立場（『這就是不公平的社會』或『他們是自己不努力』），那會讓觀察變成找證據。", "別把它導向『所以我們該支持某種政策』——這張卡停在問題浮現，不替孩子選邊。"]}, "source": {"type": "research-derived", "citation": "Anna E. Berti & Anna S. Bombi (1988) The Child's Construction of Economics, Cambridge University Press（譯自 1981 義大利文版，Gerard Duveen 譯）。內容為兒童經濟概念（工作、金錢、貧富、社會階級）的發展性建構；實證樣本以幼童至學齡兒童為主"}, "tags": ["scaleup-13to18", "金錢與選擇", "公平與分配", "機會成本", "行動題"], "language": "zh-Hant-TW"}, {"id": "LOG0000011", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "邏輯與謎題", "sub_category": "因果與相關", "question_type": "沈思題", "action_icon": "heart", "question": "想一句你最近聽過的「因為甲所以乙」，會不會其實還有第三件事，同時讓甲和乙一起發生？你願意先放著這個猜想，不急著決定誰對嗎？", "parent": {"context": "青少年開始能同時握住多個變項，不再只看「一件事推出另一件事」的直線。這張卡不是要他學會某個名詞，而是邀請他對自己脫口而出的「因為」多停一秒。日常裡的「因為熬夜所以成績差」「因為他人緣好所以快樂」都可能藏著沒被看見的第三者。讓他自己發現，比你指出來更有力量。", "extensions": ["一起回想一句你們家也常講的「因為…所以…」，看看背後會不會還躲著別的原因", "翻一則新聞標題，問問那兩件事是真的一個造成另一個，還是只是常常一起出現", "如果他卡住，可以聊「兩件事一起來」和「一件事帶來另一件事」感覺哪裡不一樣"], "dont": ["別急著糾正他舉的例子「錯了」，這張卡沒有要找出標準答案", "別把它變成解釋「相關不等於因果」的小課，讓他用自己的話摸索就好"]}, "source": {"type": "research-derived", "citation": "Inhelder, B., & Piaget, J. (1958). The Growth of Logical Thinking from Childhood to Adolescence: An Essay on the Construction of Formal Operational Structures. New York: Basic Books."}, "tags": ["scaleup-13to18", "因果與相關", "邏輯與謎題", "沈思題"], "language": "zh-Hant-TW"}, {"id": "LOG0000012", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "邏輯與謎題", "sub_category": "機率直覺錯誤", "question_type": "行動題", "action_icon": "mouth", "question": "找一句你常聽人說的「我認識的都這樣」，去問問身邊幾個人，看看是不是真的都這樣。如果有人不是，他們的故事平常為什麼比較少被你聽到？", "parent": {"context": "「我認識的都成功了」「我看到的都很順」之所以常常騙人，是因為沒成功、沒留下來的人，往往不在我們看得到的地方。青少年的社交圈正在擴大，這種「只看見留下來的人」的錯覺對他特別真實。這張卡讓他親自去找那些「不在場」的樣本，比聽道理更印象深刻。〔執行前提〕白天進行；只問願意聊的人，不勉強；若話題碰到誰失敗或離開讓他不安，先停，改成觀察新聞或網路現象也可以。", "extensions": ["問完之後聊聊：那些「沒被算進去的人」，是不是剛好最不會被我們遇到", "換個場域試試，例如店家、社團、網路熱門貼文下面，看看是不是也有人沒被看見", "如果不方便問人，可以改觀察一則「成功故事」，想想沒成功的人為什麼很少被講出來"], "dont": ["別把它導向「所以別人都在騙你」這種結論，重點是看見誰沒被算到", "別要求他訪問到一個漂亮的數字或比例，這不是作業也沒有達標線", "就算問完發現大家真的都這樣，也別硬要他找出反例——重點是練習看見問句之外的人。"]}, "source": {"type": "research-derived", "citation": "Amos Tversky & Daniel Kahneman (1974). Judgment under Uncertainty: Heuristics and Biases. Science, 185(4157), 1124-1131."}, "tags": ["scaleup-13to18", "機率直覺錯誤", "邏輯與謎題", "行動題"], "language": "zh-Hant-TW"}, {"id": "LOC0000016", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "本土文化", "sub_category": "認同與身分", "question_type": "沈思題", "action_icon": "heart", "question": "如果有人問你「你是哪裡人」，你會用什麼來回答——出生地、血緣、講的語言、想念的食物，還是別的？換一個標準，答案會不會就變了。", "parent": {"context": "青少年正在把「我是誰」從一個固定答案，慢慢看成一件可以從很多角度回答、而且會隨情境改變的事。這張卡不是要你的孩子選一個正確身分，而是邀請他發現「我是哪裡人」其實藏著好幾把不同的尺。台灣社會裡有原住民、移民後代、新住民家庭、在不同縣市或海外長大的人，每個人手上的尺都不太一樣，沒有哪一把比較對。", "extensions": ["如果換你問家裡每個人同一個問題，會不會收到不一樣的答案，為什麼。", "有沒有一種場合（出國、轉學、填表格）讓你特別意識到自己「是哪裡人」。", "你身邊有沒有人的答案讓你意外，後來你怎麼理解他的尺。"], "dont": ["別替他訂出一個「正確」的身分認同，或暗示某一種答案比較有歸屬感。", "別把這變成考血緣或地理的小測驗，重點是他怎麼挑選與權衡，不是答得對不對。"]}, "source": {"type": "research-derived", "citation": "Stuart Hall, \"Cultural Identity and Diaspora,\" in Jonathan Rutherford (ed.), Identity: Community, Culture, Difference (London: Lawrence & Wishart, 1990), pp. 222-237 — 文化認同是「生成（becoming）」而非固定本質，隨歷史與位置被多重定位"}, "tags": ["scaleup-13to18", "本土文化", "認同與身分", "沈思題"], "language": "zh-Hant-TW"}, {"id": "LOC0000017", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "本土文化", "sub_category": "歷史記憶與多重視角", "question_type": "行動題", "action_icon": "mouth", "question": "找兩位背景很不一樣的長輩，問他們同一段台灣往事，聽聽哪裡記得不一樣。同一件事，誰被記得、誰被略過了——這個「被選擇」本身，在告訴你什麼？", "parent": {"context": "同一段歷史，不同世代、族群、地方的人記得的版本常常不同，這不是誰在說謊，而是記憶會隨人的位置而被選擇與保存。讓青少年親自蒐集兩個版本、並停在「為什麼會不一樣」這個問題上，比給他一個標準答案更接近歷史的真實樣貌。〔執行前提〕白天進行、選對方願意聊的往事；若長輩談起來情緒變沉重就先停下，不追問。Plan B：找不到兩位長輩，可改訪一位長輩加一段紀錄片或老報導，或請家人轉述他聽過的不同說法。", "extensions": ["兩個版本不一樣的地方，比較像是記得的細節不同，還是在意的重點不同。", "同一件事，為什麼這位長輩記得這個畫面、那位記得另一個。", "聽完之後，你會更想去查證哪一個說法，還是更想再問第三個人。"], "dont": ["長輩談起來情緒變沉重，就先停下、不追問——這比問完更重要。", "別引導他判斷哪位長輩「記錯了」或哪個版本才是真相，差異本身才是這張卡要看的東西。", "別把話題推向誰對誰錯的政治立場，停在好奇與多重視角，不選邊。"]}, "source": {"type": "research-derived", "citation": "Benedict Anderson (1983), Imagined Communities: Reflections on the Origin and Spread of Nationalism, London: Verso. （記憶與遺忘建構共同體論見第 11 章「Memory and Forgetting」，1991 增訂版新增）"}, "tags": ["scaleup-13to18", "本土文化", "歷史記憶", "行動題"], "language": "zh-Hant-TW"}, {"id": "NAT0000010", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "自然與宇宙", "sub_category": "深時間與尺度", "question_type": "沈思題", "action_icon": "heart", "question": "如果把整個宇宙的歷史壓縮成一年，人類大概到最後幾秒才出現；你出現的那一瞬間落在哪裡？坐著想想，看它在你心裡留下什麼。", "parent": {"context": "形式運思期的青少年已經能想像遠超出自身經驗的時間尺度。把宇宙史壓成一年（宇宙曆）不是要他背年代，而是讓「自己存在的這一瞬」被放進一個極大的背景裡，引出敬畏與好奇，而不是渺小的焦慮。〔執行前提〕白天或精神好的時候聊；如果孩子顯得不安或覺得「那我算什麼」，先停下來陪著，可以改聊「那這一瞬間你最想拿來做什麼」，也可以整張跳過改天再來。", "extensions": ["問問孩子，如果一年裡人類只佔最後幾秒，那他自己這十幾年又佔多小一段——這讓他更想把時間花在什麼上？", "聊聊不同尺度看同一件事：一件今天很大的煩惱，放進一百年、放進宇宙史，感覺有沒有變？哪些事反而放再大也不會縮小？", "讓孩子自己挑一個尺度（一天、一輩子、一個文明）畫成一條線，標出他覺得重要的點，看看順序跟他原本想的一不一樣。"], "dont": ["別急著糾正他壓縮的比例對不對，這不是天文考題，重點是他怎麼安放自己。", "別把它導向「所以你很渺小／所以要珍惜時間」的結論，讓敬畏自己長出來，不替他下定論。"]}, "source": {"type": "research-derived", "citation": "Carl Sagan (1980), Cosmos, New York: Random House —「宇宙曆」（Cosmic Calendar）將宇宙史壓縮為一年以建立尺度直覺；David Christian (2004), Maps of Time: An Introduction to Big History, Berkeley: University of California Press — 大歷史的多尺度時間框架"}, "tags": ["scaleup-13to18", "深時間", "尺度", "宇宙", "敬畏", "沈思題", "自然與宇宙"], "language": "zh-Hant-TW"}, {"id": "NAT0000011", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "自然與宇宙", "sub_category": "科學如何確定一件事", "question_type": "行動題", "action_icon": "mouth", "question": "去問一個你信任的大人或老師：科學家怎麼「確定」一件看不見的事是真的，例如地球真的繞著太陽轉？把他說的當線索，去查查當年的人看到什麼才願意相信——也想想，有沒有哪些事到現在大家還在爭。", "parent": {"context": "青少年開始能分辨「我相信」「大家都這麼說」和「有證據支持」之間的差別，這正是認識論思考的起點。這張卡不灌輸科學結論，而是讓孩子去追問「我們是怎麼知道的」——把知識當成一個有理由、可被檢驗的過程，而不是課本上的標準答案。〔執行前提〕需要找一位願意聊的大人，若一時找不到，plan B 是改查一段可信的科普影片或書，把「他們當年靠什麼證據」當成尋寶線索。", "extensions": ["讓孩子比較兩種說法：「我覺得」和「有觀察與證據」，問他生活裡哪些事其實只是大家習慣這麼說、還沒被好好驗證過。", "聊聊模型和真實的差別——地圖不是真正的土地，那科學的解釋是不是也只是目前最好用的一張地圖？哪天可能被更好的取代？", "請孩子自己挑一件他半信半疑的說法（網路上的、長輩說的都行），去找找看支持和反對的證據各有哪些，再決定自己信幾分。"], "dont": ["別替他總結「所以科學最可靠／所以不要亂信」，留住他自己權衡證據的空間。", "別把都市傳說或流行說法當成確定事實丟給他（例如某些被簡化的科普口號），用「有些人說、不一定全對」的方式誠實保留。"]}, "source": {"type": "research-derived", "citation": "Carl Sagan (1980) Cosmos, Random House — 對證據、懷疑與科學方法的公眾闡述（第 3 章〈The Harmony of the Worlds〉論 Tycho/Kepler 如何以證據確立日心說）；Donella H. Meadows (2008) Thinking in Systems: A Primer, Chelsea Green（Diana Wright 編）— 模型/心智模型是對真實系統的有限簡化、永遠不等於真實本身"}, "tags": ["scaleup-13to18", "科學方法", "證據", "認識論", "模型與真實", "行動題", "自然與宇宙"], "language": "zh-Hant-TW"}, {"id": "SOC0000007", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "人與社會", "sub_category": "正義與規則", "question_type": "沈思題", "action_icon": "star", "question": "如果一條規定本身就是錯的，遵守它的人算不算也錯了？想想看，你遇過或聽過誰為了某個理由打破了規則——那次到底算對還是錯，你可以一直拿不定主意沒關係。", "parent": {"context": "青少年開始能把「合法」和「正當」分開來看，這是道德推理走向成熟的關鍵一步。這張卡不要孩子選邊或得出結論，只是邀請他在「規則該守」和「規則該破」這兩股力量之間，自己待一會兒。〔執行前提〕白天聊、不必逼出答案、孩子若沉默或想跳過都可以；可以從電影或新聞裡的例子聊起，不一定要碰自己的事。", "extensions": ["可以聊聊歷史上那些「違法但後來被認為正確」的事，當時的人怎麼判斷的", "換個角度問：如果每個人都自己決定哪條規則可以不守，會發生什麼", "問問家裡長輩，他們有沒有遇過「明明覺得不對、但大家都照做」的規定"], "dont": ["別急著給孩子一個「正確答案」或灌輸某種立場，這題本來就沒有標準解", "別把話題導向特定政黨或當下的爭議事件，焦點是思辨不是表態"]}, "source": {"type": "research-derived", "citation": "Lawrence Kohlberg (1981). Essays on Moral Development, Volume 1: The Philosophy of Moral Development: Moral Stages and the Idea of Justice. San Francisco: Harper & Row."}, "tags": ["scaleup-13to18", "人與社會", "正義與規則", "沈思題", "道德推理"], "language": "zh-Hant-TW"}, {"id": "SOC0000008", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "人與社會", "sub_category": "群體與個人", "question_type": "行動題", "action_icon": "eye", "question": "找一個有一群人在一起的場合，安靜觀察十分鐘：有沒有人做了一件，自己單獨時大概不會做的事？接著去問問其中一個人，當時心裡在想什麼。", "parent": {"context": "「一群人會做出個人不會做的事」是青少年正在親身經歷的社會現象（同儕壓力、從眾）。把它從「自己被捲進去」抽離成「在外面觀察」，孩子比較能冷靜看見機制，而不是被責備。〔執行前提〕選安全、公開的場合（球賽、市集、排隊、線上社群都算）；只觀察不介入，不去評論或拍攝任何人；若場合讓孩子不舒服就換一個或改天。", "extensions": ["回來後聊聊：那個人的理由，和你從外面看到的，一不一樣", "換場域再看一次——運動場、網路留言、班級，從眾的樣子有沒有不同", "問自己：如果當時是我在那群人裡，我會看得出來嗎"], "dont": ["別把這當成抓誰的錯，觀察是為了看見現象，不是評判人", "別要求孩子去刻意挑釁或測試別人，只是安靜地看和問"]}, "source": {"type": "research-derived", "citation": "Asch, S. E. (1951). Effects of group pressure upon the modification and distortion of judgments. In H. Guetzkow (Ed.), Groups, Leadership and Men (pp. 177-190). Pittsburgh, PA: Carnegie Press."}, "tags": ["scaleup-13to18", "人與社會", "群體與個人", "行動題", "從眾"], "language": "zh-Hant-TW"}, {"id": "MAK0000007", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "動手與感官", "sub_category": "手作與珍惜", "question_type": "沈思題", "action_icon": "heart", "question": "想一件你留著、但別人可能不懂你為什麼要留的手作物，是什麼讓它對你和對別人不一樣？如果有一天它真的壞了，你會修它、留著它，還是放手？", "parent": {"context": "青少年正在發展自己的價值判斷，開始能分辨「市場價格」和「個人意義」是兩回事。手作物常承載時間、關係與不可複製的痕跡，這張卡邀請孩子去感覺「珍惜」這件事的來源，而不是去評斷消費對不對。沒有標準答案，捨得丟也是一種答案。", "extensions": ["如果話頭打開了，可以一起翻翻家裡有沒有別人手作、傳下來的東西，聽聽它的來歷", "可以延伸聊：量產的東西為什麼比較容易說丟就丟，是東西的問題還是我們和它的關係", "孩子若提到某段回憶，順著回憶走就好，不必把話題拉回「所以你學到什麼」"], "dont": ["別把它導向「所以要愛惜物品、不要浪費」的結論，那會把開放的感受變成說教", "別評論孩子珍惜或不珍惜哪樣東西「很奇怪」，意義是很私人的"]}, "source": {"type": "research-derived", "citation": "Richard Sennett (2008) The Craftsman, New Haven: Yale University Press — Part Two \"Material Consciousness\"，論手作中累積的物質意識與人對親手所製之物的情感連結與不可複製性"}, "tags": ["scaleup-13to18", "手作", "惜物", "價值反思", "n/a"], "language": "zh-Hant-TW"}, {"id": "MAK0000008", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "動手與感官", "sub_category": "設計取捨", "question_type": "行動題", "action_icon": "hand", "question": "找一個你天天用、卻從沒細看過的東西（門把、湯匙、手機殼都行），用手摸一遍、翻過來看，問自己：它為什麼長這樣？好用和好看，當初做它的人先選了哪一個？", "parent": {"context": "每件日常物品都是一連串看不見的取捨：成本、好握、好看、好製造，互相拉扯。青少年的系統性思考剛好能看出「一個形狀背後有很多被犧牲掉的選項」。這張卡讓孩子親手把玩、推測設計者的判斷，重點是觀察與假設，不是查出正確答案。", "extensions": ["可以鼓勵孩子找第二個同功能但長得不一樣的東西比對，例如兩種開罐器，看設計者各自賭了什麼", "若孩子想得起勁，可以延伸問：如果讓你重新設計這個東西，你會先保住哪一點、捨棄哪一點", "孩子的推測就算和真實設計史不同也沒關係，推測的過程比答對更有意思"], "dont": ["別急著上網查「正確的設計理由」來糾正孩子，那會把探索變成查資料考試", "別把它變成評比「設計好壞」的打分，重點是看見取捨而非下判決"]}, "source": {"type": "research-derived", "citation": "Donald A. Norman (1988) The Psychology of Everyday Things, Basic Books（後於 1990/2002 改名為 The Design of Everyday Things）— affordances 與物件形態如何體現功能、可用性與外觀的取捨"}, "tags": ["scaleup-13to18", "設計", "取捨", "觀察", "動手", "n/a"], "language": "zh-Hant-TW"}, {"id": "BOD0000008", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "身體與健康", "sub_category": "生理時鐘與睡眠節律", "question_type": "行動題", "action_icon": "eye", "question": "有人說青少年的身體時鐘天生比小孩和大人都晚，連續一週記下你每天「真正想睡」和「真正想醒」的時刻，看看它和你被要求的作息差多少。一週後，這份紀錄想跟你說什麼？", "parent": {"context": "青少年進入青春期後，褪黑激素分泌時間往後移，許多人的生理睡眠相位確實會延遲——這不是懶散，是發育中的身體節律。這張卡邀請孩子用觀察者而非被評價者的角度，認識自己身體的節奏，並注意它和外在時間表的張力。重點不是得出「該幾點睡」的結論，而是讓孩子發現「我的身體有它自己的時間」這件事本身。", "extensions": ["把紀錄裡的落差拿去和不同年齡的家人比一比，誰的身體時鐘和你最像、最不像？", "如果你能重新安排一天的開始時間，你會怎麼設計，為什麼？", "去查青少年生理時鐘的相關說法，哪些有研究支持、哪些只是流傳？"], "dont": ["別把這變成「所以你該早點睡」的勸導——那會讓觀察變成被審問。", "別用紀錄去評斷孩子作息好壞，數據是給他自己讀的，不是給你打分的。"]}, "source": {"type": "research-derived", "citation": "Mary A. Carskadon (2011). Sleep in Adolescents: The Perfect Storm. Pediatric Clinics of North America, 58(3), 637–647. DOI: 10.1016/j.pcl.2011.03.003"}, "tags": ["scaleup-13to18", "身體與健康", "睡眠與生理時鐘", "自我觀察", "agency"], "language": "zh-Hant-TW"}, {"id": "BOD0000009", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "身體與健康", "sub_category": "壓力與身體訊號", "question_type": "沈思題", "action_icon": "heart", "question": "壓力不只是一種心情，它常常會先在身體某處冒出來——肩膀、肚子、下巴、呼吸。想想最近一次你感覺被壓著的時候，身體是哪裡先替你說了話？它好像在提醒你什麼？", "parent": {"context": "〔執行前提：白天聊、孩子露出不安就停下、隨時可跳過。〕壓力反應是真實的生理過程，身體的緊繃常常比意識更早察覺到負荷。這張卡邀請孩子把身體當成一個會傳訊號的夥伴，而不是要修理的對象，練習傾聽而非壓抑。這不是要診斷或解決什麼，只是讓孩子發現身體和情緒之間有條他可以自己留意的線。若孩子聊到讓他更焦慮的事，停在傾聽就好。", "extensions": ["你的身體訊號和你信任的人一樣嗎？問問看別人壓力來時身體哪裡先反應。", "下次留意到那個訊號出現時，你想為自己做點什麼小事？", "去了解身體在壓力下會發生哪些變化，哪些是短暫保護、哪些長期會累。"], "dont": ["別把孩子說出的身體不適急著解讀成某種病或問題，傾聽比命名重要。", "別追問壓力源是不是學校或家裡——讓孩子自己決定要不要說、說多少。"]}, "source": {"type": "research-derived", "citation": "Robert M. Sapolsky (2004). Why Zebras Don't Get Ulcers: An Updated Guide to Stress, Stress-Related Diseases, and Coping (3rd ed.). New York: Holt Paperbacks (Henry Holt)."}, "tags": ["scaleup-13to18", "身體與健康", "壓力與身體", "身心連結", "情緒安全"], "language": "zh-Hant-TW"}, {"id": "SPI0000020", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "靈性", "sub_category": "世界多元", "question_type": "行動題", "action_icon": "mouth", "question": "找一個你家會過的節日，再找一個別人家或別的地方才過的節日，問問身邊的人這兩個節日各自在盼望什麼。它們盼望的，有沒有藏著一樣的東西？", "parent": {"context": "10-11 歲的孩子已經能同時拿著兩個例子做比較，並從表面差異往下找共通點。這張卡請他比較兩個不同的慶祝或儀式，再推一層：熱鬧的形式底下，人們是不是在盼望類似的事（團圓、平安、新的開始）。重點不在認得多少節日，而在他能不能自己連出那條看不見的線。", "extensions": ["如果他找到了共通點，可以反過來問：那這兩個節日「不一樣」的地方，又是在回應各自什麼樣的生活？", "把範圍從家裡擴到更遠：不同國家、不同信仰、甚至沒有宗教的家庭，他們的重要日子在盼望什麼？", "讓他想一個「全世界的人」可能都會想慶祝的時刻，他會設計成什麼樣子。"], "dont": ["別替他先講出「其實都是團圓啦」這種答案，他自己連出來的線才會留住。", "別把某個節日講成比較高級或比較正確，各自的盼望都平等。"]}, "source": {"type": "research-derived", "citation": "David Hay & Rebecca Nye (2006)《The Spirit of the Child (Revised Edition)》，Jessica Kingsley Publishers — relational consciousness（關係性意識）中孩子對「人與人共通連結」（child-others 取向）的覺察"}, "tags": ["scaleup-10to11", "世界多元", "比較推理", "節日儀式"], "language": "zh-Hant-TW"}, {"id": "SPI0000021", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "靈性", "sub_category": "宇宙大哉問", "question_type": "沈思題", "action_icon": "star", "question": "想一個非常非常大的數字，大到要喘口氣才念得完。如果有人說「這就是最大的數字了」，你能不能在它後面再加一個，讓它變得更大？那這樣下去，最大的數字真的存在嗎？", "parent": {"context": "這張卡用一個孩子完全握得住的具體動作——「加一」——帶他撞上「無限」的邊。10-11 歲還沒到純抽象命題，但已經能做「如果…那會怎樣」的假設推理。讓他親自試著推到底，發現每次都還能再加一，那種「停不下來」的感覺，比直接告訴他「數字是無限的」更深。", "extensions": ["如果他覺得加得完，請他真的試試看，看會不會卡住，卡在哪裡。", "換個方向問：那有沒有「最小」的數字？往小的那邊推會發生什麼事？", "把這份「停不下來」的感覺，連到別的東西：時間有沒有最開始的一刻？"], "dont": ["別急著教他「無限」這個詞或符號，先讓他自己撞到那道推不完的牆。", "別把它變成數學考題去要一個正確答案，這是讓他驚奇的，不是讓他答對的。"]}, "source": {"type": "research-derived", "citation": "Bärbel Inhelder & Jean Piaget (1958). The Growth of Logical Thinking from Childhood to Adolescence: An Essay on the Construction of Formal Operational Structures. New York: Basic Books."}, "tags": ["scaleup-10to11"], "language": "zh-Hant-TW"}, {"id": "LNG0000020", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "語文", "sub_category": "近義詞的細微差別", "question_type": "沈思題", "action_icon": "star", "question": "「漂亮」、「美麗」、「好看」，你會用哪一個來形容晚霞、用哪一個來形容好朋友的新鞋？換過來說說看，感覺哪裡不一樣。", "parent": {"context": "10-11 歲的孩子已經能感覺到近義詞之間有微妙差別，但常說不出差在哪。這張卡讓他先「用用看、換換看」，從自己的語感裡發現：意思接近的詞，其實搭配的場合、給人的感覺都不太一樣——不是背定義，是親身比對。", "extensions": ["如果他卡住，可以一起多找幾組：你會說哪些東西「美麗」、哪些只說「好看」？把分得出來和分不出來的都收著。", "問他：有沒有哪個詞，用在某個東西上會怪怪的？那個「怪」就是線索。", "延伸到別組近義詞，例如「累」和「疲倦」、「高興」和「開心」，看看是不是也分場合。"], "dont": ["別急著告訴他「正確的差別是什麼」——標準答案會關掉他自己的語感。", "別糾正他的搭配「用錯了」，先聽他為什麼這樣選。"]}, "source": {"type": "research-derived", "citation": "Eve V. Clark (1993)《The Lexicon in Acquisition》, Cambridge University Press — 對比原則（principle of contrast）：語言中沒有兩個詞意思完全相同，差別藏在使用情境。"}, "tags": ["scaleup-10to11", "語文", "近義詞", "沈思題"], "language": "zh-Hant-TW"}, {"id": "LNG0000021", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "語文", "sub_category": "俗語裡的道理", "question_type": "行動題", "action_icon": "ear", "question": "去問一個長輩一句台灣俗語，例如「吃緊弄破碗」，問他這句在講什麼道理、什麼時候會用。聽完想想，今天有沒有哪件事正好可以套上。", "parent": {"context": "俗語是把一個道理藏進具體畫面裡，10-11 歲的孩子已經能從「打破碗」這種具體場景，推到背後「太急反而壞事」的道理。這比 9 歲的字詞遊戲多了一層推理，又比 12 歲談語言結構更貼日常。讓他向真人請教，俗語的味道和使用時機才活得起來。", "extensions": ["如果長輩想到別句，更好——順著他給的那句聊，問問是聽誰說的。", "把這句俗語和最近發生的事配對：哪件事「正好就是這個意思」？", "下次再問一句，慢慢收集，看看哪些俗語其實在講很像的道理。"], "dont": ["別把它變成「考你懂不懂這句成語」，重點是長輩怎麼說、用在哪。", "別替他總結「這句的意思就是……」，讓他自己用一件事說出來。"]}, "source": {"type": "research-derived", "citation": "Gombert, J.-É. (1992). Metalinguistic Development. Chicago: University of Chicago Press."}, "tags": ["scaleup-10to11", "語文", "俗語", "行動題"], "language": "zh-Hant-TW"}, {"id": "MON0000011", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "金錢與選擇", "sub_category": "價格比較", "question_type": "行動題", "action_icon": "eye", "question": "同一樣你想要的東西，到三個不同的地方看看它的價格，記下來。哪裡最貴、哪裡最便宜，你猜猜看為什麼會差這麼多？", "parent": {"context": "10-11 歲的孩子已經能同時拿著好幾個價格做比較，也開始會問「為什麼會不一樣」。這張卡不是要他找出最便宜的答案，而是讓他發現「同樣的東西，價格背後藏著不同原因」——可能是地點、店租、新舊、有沒有促銷。比起九歲時單純的交換取捨，這裡多了一層「找規律與例外」的推理。", "extensions": ["如果同一家店過幾天再去看，價格會變嗎？孩子可以隔幾天再記一次，看看有沒有變化。", "問問家裡買菜或網購的人，他們怎麼決定在哪裡買，是只看價格，還是還看別的。", "讓孩子想想：最便宜的那個，是不是一定最划算？有沒有什麼是價格看不出來的。"], "dont": ["別急著告訴他「便宜的有問題」或「貴的比較好」，價格高低的原因本來就有很多種，讓他自己拼湊。", "別把它變成抓他比價買對東西的考試，重點是他發現了什麼，不是他選了哪個。"]}, "source": {"type": "research-derived", "citation": "Berti, A. E., & Bombi, A. S. (1988). The Child's Construction of Economics (G. Duveen, Trans.). Cambridge University Press. (European Monographs in Social Psychology)."}, "tags": ["scaleup-10to11", "金錢與選擇", "價格比較", "行動題", "多變項推理"], "language": "zh-Hant-TW"}, {"id": "MON0000012", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "金錢與選擇", "sub_category": "廣告想讓你覺得什麼", "question_type": "沈思題", "action_icon": "star", "question": "想一個你最近看過、讓你很想要那樣東西的廣告。它是用什麼方法讓你心動的——畫面、聲音、還是讓你覺得擁有了會變得怎樣？換成是你，會用哪一招？", "parent": {"context": "這個年紀的孩子開始能跳出「廣告在介紹商品」的表面，去想「廣告其實在設計我的感覺」。這張卡停在「觀察一個廣告的手法」這一層具體經驗上，還不到十三歲以後談的真假、公平或操弄。讓他先看見手法，再試著「如果是我會怎麼做」，是一種安全的假設推理。", "extensions": ["孩子說出一招之後，可以問他：這招是讓你想到東西本身，還是想到用了之後的你？", "找另一個賣完全不同東西的廣告對照，看看它們用的招數一不一樣。", "讓他試著倒過來想：有沒有哪個廣告，看完反而讓他不想買？是什麼讓他踩了煞車。"], "dont": ["別急著下結論說「廣告都在騙人」，他需要的是看見手法，而不是接收一個現成的判斷。", "別糾正他「該不該想要那樣東西」，想要本身不是錯，這張卡只看他怎麼觀察。"]}, "source": {"type": "research-derived", "citation": "Herbert P. Ginsburg & Sylvia Opper (1988). Piaget's Theory of Intellectual Development, 3rd ed. Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["scaleup-10to11"], "language": "zh-Hant-TW"}, {"id": "LOG0000013", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "邏輯與謎題", "sub_category": "假設與檢驗", "question_type": "行動題", "action_icon": "hand", "question": "先猜猜看：紙團和攤開的紙，哪個會先落地？把猜測說出來，再各丟一次看看，結果跟你想的一樣嗎？", "parent": {"context": "這張卡讓孩子練習「先有一個猜測，再設計一個簡單方法去試」——這正是科學思考的雛形，重點不在誰猜對，而在「願意先押一個答案、再用行動驗證」。〔執行前提〕只需要兩張一樣的紙，撕一張揉成團即可；若手邊沒紙，換成「同一顆橡皮擦從高處和低處落下，哪個聲音大」也成立。孩子猜錯時別糾正，那一刻的驚訝正是他最想追問的起點。", "extensions": ["問問他：如果換成更重或更輕的東西，結果會不會不一樣？要怎麼試？", "讓他想想，剛才那個猜測是根據什麼？是看過、聽過，還是直覺？", "鼓勵他改一個條件再丟一次，看看哪個變項真的有影響。"], "dont": ["別在他丟之前就告訴他「空氣阻力」的答案，會關掉他自己驗證的動力。", "別把猜錯說成「你錯了」，猜測本來就是用來被檢驗的。"]}, "source": {"type": "research-derived", "citation": "Bärbel Inhelder & Jean Piaget (1958) The Growth of Logical Thinking from Childhood to Adolescence, Basic Books — 形式運思萌芽期孩子開始能提出假設並設計操作去檢驗。"}, "tags": ["scaleup-10to11", "邏輯與謎題", "假設與檢驗", "行動題"], "language": "zh-Hant-TW"}, {"id": "LOG0000014", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "邏輯與謎題", "sub_category": "排列與可能性", "question_type": "沈思題", "action_icon": "star", "question": "三個好朋友要排成一排拍照，總共有幾種不同的排法？想想看，你怎麼確定自己沒有漏掉、也沒有重複算到某一種？", "parent": {"context": "這張卡帶孩子從「隨便數」走向「有系統地數」——不只是算出六種，而是想出一套不重不漏的數法（例如先固定第一個人，再排另外兩個）。這一層「怎麼確定我沒漏掉」的反思，正是 10-11 歲開始萌芽的能力。可以延伸到玩具、水果或任何三四樣具體的東西，讓他用實物排排看。", "extensions": ["問他：如果變成四個人，排法會變多少？有沒有辦法不用全部列出來，也能算出來？", "讓他試著「先固定一個位置」再數其他，看看是不是比亂猜更不會漏。", "可以延伸：那如果其中兩個人一定要站在一起呢，排法會變多還是變少？"], "dont": ["別直接給他公式或「3 乘 2 乘 1」，會跳過他自己摸索系統數法的過程。", "別嫌他列得慢或列重複，列錯再修正正是他發現「需要一套方法」的契機。"]}, "source": {"type": "research-derived", "citation": "Herbert P. Ginsburg & Sylvia Opper (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["scaleup-10to11", "邏輯與謎題", "排列與可能性", "沈思題"], "language": "zh-Hant-TW"}, {"id": "LOC0000018", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "本土文化", "sub_category": "兩個節日的比較", "question_type": "沈思題", "action_icon": "star", "question": "端午節和中元節，人們都在門口或水邊忙著準備些什麼，這兩個節日想擋住的、或想招待的，是同一種東西嗎？想想看，再去問家裡的大人他們小時候怎麼過。", "parent": {"context": "10-11 歲的孩子已經能同時拿兩個節日來比較、找出相同與不同，而不只是各自描述。端午掛艾草、划龍舟驅瘟，中元普渡擺供品、放水燈，背後都有「面對看不見的存在」的心理，但一個偏向驅趕、一個偏向款待。這題不是要孩子背節日由來，是讓他發現兩件事可以放在一起想。", "extensions": ["如果你家有長輩，問問他們小時候這兩個節日各做什麼，跟現在一樣嗎", "可以一起找找看，還有哪些節日也是在跟看不見的東西打交道", "聊聊看，為什麼有的對象用『擋』的、有的用『請客』的，差別可能在哪"], "dont": ["不用先講出正確的節日由來再讓孩子回答，他猜的方向本身就有價值", "不必追問『所以正確答案是什麼』，這題本來就沒有標準答案"]}, "source": {"type": "research-derived", "citation": "Herbert Ginsburg & Sylvia Opper (1988) Piaget's Theory of Intellectual Development, 3rd ed., Prentice-Hall — 具體運思期的比較與分類能力"}, "tags": ["scaleup-10to11", "本土文化", "節日比較", "沈思題"], "language": "zh-Hant-TW"}, {"id": "LOC0000019", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "本土文化", "sub_category": "地名裡的線索", "question_type": "行動題", "action_icon": "mouth", "question": "你住的地方、或常去的一條路，名字裡藏著什麼線索——是以前有水、有樹、有某種工作的人，還是紀念了誰？先寫下你的猜測，再去問住得久的鄰居或長輩，比比看誰的版本更有故事。", "parent": {"context": "地名常是過去地形、產業或移民的化石：有『埤』『陂』的多半曾有水塘，『厝』是聚落，『仔』『庄』透露規模，紀念性路名則記著人。10-11 歲的孩子能從名字推測背後的線索、再去驗證，這比 9 歲的『數街上有幾隻石獅』多了一層推理，又比 12 歲整理地名系統規律更貼近單一具體案例。〔執行前提〕需要孩子開口問人；若孩子怕生或附近沒熟識鄰居，plan B 是改問家裡長輩，或一起上網查地名由來再對照。", "extensions": ["把孩子的猜測和問到的答案擺在一起，差在哪裡，誰的版本比較有意思", "走路或搭車時，留意還有哪些地名路名也帶著同類線索", "如果問到的長輩也不確定，可以一起去查，把『不知道』也當成發現"], "dont": ["不必先把地名由來查好再讓孩子問，他自己推測再求證的過程才是重點", "孩子猜錯時不用糾正成『你看錯了』，錯的猜測也透露他怎麼想"]}, "source": {"type": "research-derived", "citation": "Norma González, Luis C. Moll & Cathy Amanti (Eds.) (2005). Funds of Knowledge: Theorizing Practices in Households, Communities, and Classrooms. Routledge (原 Lawrence Erlbaum/Mahwah, NJ)."}, "tags": ["scaleup-10to11", "本土文化", "地名線索", "行動題"], "language": "zh-Hant-TW"}, {"id": "LOC0000020", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "本土文化", "sub_category": "快消失的老行業", "question_type": "沈思題", "action_icon": "star", "question": "想想看修傘的、磨菜刀的、補鍋的這類師傅，以前他們替人解決了什麼麻煩？如果現在這種師傅變少了，可能是因為東西變了、人變了、還是別的原因——挑一個你最常見不到的，去問問大人為什麼。", "parent": {"context": "修傘、磨刀、補鍋、打鐵、爆米香這些走街叫賣或定點的老行業，過去解決的是『東西壞了要修、要續用』的需求。它們變少，背後可能是東西變便宜（壞了就丟）、材質變了、生活步調變了等多個原因交織。10-11 歲的孩子能同時考慮好幾個可能原因、再想『如果…會怎樣』，這比 9 歲描述一個攤位多了因果推理，又比 12 歲分析產業結構更具體可問。", "extensions": ["讓孩子先自己列幾個『可能的原因』，再去問大人，看看對得上哪些", "聊聊看，如果這種師傅完全不見了，會不會有什麼東西也跟著不見", "找找看現在還有沒有類似的『幫人修東西』的工作，只是換了樣子"], "dont": ["不用直接給孩子『因為大家變得用過即丟』這種標準答案", "不必評論孩子想的原因夠不夠完整，多想到一個就值得肯定"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["scaleup-10to11", "本土文化", "老行業", "沈思題"], "language": "zh-Hant-TW"}, {"id": "NAT0000012", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "自然與宇宙", "sub_category": "動物行為的為什麼", "question_type": "行動題", "action_icon": "eye", "question": "找一隻你常看得到的動物，盯著牠看十分鐘，記下牠重複做的一個動作。換個時間再看一次，這個動作和剛才一樣嗎？", "parent": {"context": "十到十一歲的孩子已經能從「看到什麼」進到「為什麼會這樣」，但仍需要一隻真實、看得到的動物當依靠，而不是抽象推論。重複觀察、再比對，是讓孩子自己發現「規律」與「例外」的第一步。動物不必稀有，麻雀、鴿子、貓、螞蟻、家裡的寵物都可以。", "extensions": ["牠在什麼情況下會做這個動作？是不是有人靠近、肚子餓、或天氣變了的時候？", "如果換一隻同類的動物，會做一樣的動作嗎？兩隻有什麼不同？", "你猜牠這樣做是為了什麼？再多看幾次，你的猜測站得住腳嗎？"], "dont": ["別急著把標準答案告訴他（例如「那是本能」），讓他的猜測多停留幾天。", "別嫌他的觀察太瑣碎或不科學，先讓他享受看見的樂趣。"]}, "source": {"type": "research-derived", "citation": "Karen Worth (2010)《Science in Early Childhood Classrooms: Content and Process》(SEED Conference Papers, Early Childhood Research & Practice) — 仔細觀察與記錄是幼兒科學探究的核心歷程"}, "tags": ["scaleup-10to11", "自然與宇宙", "動物行為", "觀察推理"], "language": "zh-Hant-TW"}, {"id": "NAT0000013", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "自然與宇宙", "sub_category": "天氣裡的規律", "question_type": "沈思題", "action_icon": "star", "question": "連著幾天記下早上的天空和當天的天氣，你能不能找出一條「如果……就可能……」的規律？接下來幾天，這條規律猜得準嗎？", "parent": {"context": "這張卡讓孩子從「觀察」跨到「假設與驗證」：先找出一條規律，再用後幾天去檢驗它。這正是控制變項與假設推理的萌芽，明顯高於九歲的純感官描述，但仍貼著孩子每天看得到的天空，不是抽象的氣象學。記錄可以用一兩句話或畫圖，不需要任何儀器。", "extensions": ["你的規律猜錯的那幾天，當天有什麼不一樣？例外會不會藏著新線索？", "除了早上的天空，還有什麼也許和天氣有關？風、雲的形狀、還是溫度？", "如果同一條規律拿到另一個季節，還會準嗎？你想先猜猜看哪裡會變。"], "dont": ["別把氣象知識一次塞給他，他自己找出的規律就算粗糙也很珍貴。", "別因為他猜錯就說「看吧」，猜錯正是他發現例外、修正想法的時候。"]}, "source": {"type": "research-derived", "citation": "Bärbel Inhelder & Jean Piaget (1958). The Growth of Logical Thinking from Childhood to Adolescence: An Essay on the Construction of Formal Operational Structures. New York: Basic Books."}, "tags": ["scaleup-10to11", "自然與宇宙", "天氣規律", "假設驗證"], "language": "zh-Hant-TW"}, {"id": "NAT0000014", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "自然與宇宙", "sub_category": "東西為什麼用這種材料", "question_type": "行動題", "action_icon": "mouth", "question": "挑一樣身邊的東西，想想它為什麼用這種材料，換成別的會差在哪？再去問一個常用到它的人，看看你想的和他說的一不一樣。", "parent": {"context": "這張卡要孩子同時權衡兩種材料的優缺點，這種「比較與取捨」明顯比九歲深，但仍是孩子拿得到、摸得到的具體物件，不是抽象的材料科學。去問一個真正用它的人（廚師、修車的、阿公、店員、家人都可以），讓孩子的推測和真實經驗對照。可挑雨傘、湯匙、鞋底、便當盒等任何身邊的東西。", "extensions": ["這種材料有什麼缺點，是它換成別的就能解決的嗎？為什麼最後還是選了它？", "同一樣東西，貴的和便宜的常用不一樣的材料，差別在哪？", "如果你來設計，你會換材料嗎？換了之後又會帶來什麼新麻煩？"], "dont": ["別替他決定「就是因為比較便宜」這類單一答案，材料的取捨往往不只一個原因。", "別嫌他問的人「不專業」，每個用過它的人都有值得聽的觀察。"]}, "source": {"type": "research-derived", "citation": "Bärbel Inhelder & Jean Piaget (1958). The Growth of Logical Thinking from Childhood to Adolescence: An Essay on the Construction of Formal Operational Structures. New York: Basic Books."}, "tags": ["scaleup-10to11", "自然與宇宙", "材料比較", "權衡取捨"], "language": "zh-Hant-TW"}, {"id": "SOC0000009", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "人與社會", "sub_category": "規則背後的理由", "question_type": "沈思題", "action_icon": "star", "question": "挑一條你每天都得照做的規則，想想看如果它突然消失，誰會先遇到麻煩、又會是誰偷偷鬆一口氣。下次遇到這條規則時，留意一下它到底在保護什麼。", "parent": {"context": "9 歲的孩子多半把規則當成「大人說的就照做」，這張卡邀請 10-11 歲的孩子多走一層：去推測規則消失後不同人會受到的不同影響，但仍貼著他生活裡摸得到的具體規則，不要拉到「法律是什麼」這種抽象命題。重點不在背出正確答案，而在他開始把規則和它想保護的東西連起來想。", "extensions": ["如果他舉得出一條規則，可以追問：這條規則對所有人都一樣公平嗎，還是對某些人比較吃虧", "陪他想一條他覺得「不合理」的規則，問問看當初訂這條的人可能在擔心什麼", "下次家裡要訂新規則時，讓他試著說出這條規則想擋掉哪件麻煩事"], "dont": ["別急著告訴他「規則就是要遵守」或糾正他舉的例子不夠好", "別把它變成「背出三個守規則的好處」的問答練習"]}, "source": {"type": "research-derived", "citation": "William Damon (1988). The Moral Child: Nurturing Children's Natural Moral Growth. New York: Free Press."}, "tags": ["scaleup-10to11", "人與社會", "規則", "沈思題", "因果推理"], "language": "zh-Hant-TW"}, {"id": "SOC0000010", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "人與社會", "sub_category": "同一件事的不同眼睛", "question_type": "行動題", "action_icon": "mouth", "question": "選一件你最近在學校或社區發生、讓你有意見的事，去問問身邊兩個立場不同的人怎麼看（例如同學和老師，或鄰居和管理員）。聽完再回頭看自己原本的想法，有沒有哪裡鬆動了。", "parent": {"context": "〔執行前提〕這張卡需要孩子主動去問兩個人，若他害羞或當下找不到對象，可以改成問家裡兩個對同一件事看法不同的大人，或先和你練習一次怎麼開口。6-8 歲只能看到「人不一樣」，12 歲才談得動抽象的「正義」；10-11 歲剛好能比較兩個具體立場、發現同一件事有不同的合理理由，這正是觀點取替能力萌芽的甜蜜點。", "extensions": ["問完後陪他比一比：這兩個人為什麼會看得不一樣，各自在乎的是什麼", "如果他發現自己想法鬆動了，可以問他是哪一句話讓他開始猶豫", "下次他和人意見不合時，鼓勵他先去問對方「你是怎麼想的」再下判斷"], "dont": ["別替他評斷哪一方才對，這張卡的價值在他自己看見多種合理", "別在他還沒問完就先幫他總結結論"]}, "source": {"type": "research-derived", "citation": "Robert L. Selman (1980) The Growth of Interpersonal Understanding: Developmental and Clinical Analyses, Academic Press — 觀點取替發展階段，Stage 3（相互／第三方角色取替）約 10-12 歲能協調並比較自己與他人對同一情境的觀點，第三方視角萌芽"}, "tags": ["scaleup-10to11", "人與社會", "觀點取替", "行動題", "對話"], "language": "zh-Hant-TW"}, {"id": "SOC0000011", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "人與社會", "sub_category": "一群人怎麼分才順", "question_type": "行動題", "action_icon": "hand", "question": "找一件需要好幾個人一起做的事（擺碗筷、搬東西、佈置教室），先想一種分工方式，做做看哪裡卡住，再調整一次。比較兩次之間，是什麼讓第二次比較順。", "parent": {"context": "這是一張行動題，孩子要真的動手把事情做兩次。9 歲談「輪流」是把同一件事輪著做，12 歲談「分工」已能想像角色與制度；10-11 歲剛好能同時考慮幾個人、幾項工作怎麼配，並從失敗中找出更順的規律，但仍需要一件具體、能立刻試的事當載體。", "extensions": ["做完後陪他想：如果多一個人或少一個人，這個分法還順嗎", "問他第二次調整時，是看見了誰的長處或誰太累才改的", "下次家裡有需要合作的事，讓他試著當提議分工的那個人"], "dont": ["別在他第一次卡住時就接手做完，卡住正是這張卡的學習點", "別評論他的分法笨或慢，重點在他自己比較出兩次的差別"]}, "source": {"type": "research-derived", "citation": "William Damon (1988). The Moral Child: Nurturing Children's Natural Moral Growth. New York: Free Press."}, "tags": ["scaleup-10to11", "人與社會", "合作分工", "行動題", "多變項"], "language": "zh-Hant-TW"}, {"id": "MAK0000009", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "動手與感官", "sub_category": "改良與測試", "question_type": "行動題", "action_icon": "hand", "question": "做一個會動或會站的小東西，先讓它動起來，再只改一個地方，看看比剛才好還是壞。改第二次前，先猜猜這次會怎樣。", "parent": {"context": "十到十一歲的孩子開始能一次只改一個變項、再比較前後差別，這正是工程師和科學家最核心的功夫。重點不在做出完美成品，而在「改一處、看差別、再決定下一步」這個反覆的過程。〔執行前提〕只要家裡現成的東西就好——疊高的積木塔、紙飛機、彈珠軌道、橡皮筋動力車都行；若一時找不到材料，可以改成調整紙飛機的摺法。", "extensions": ["問問孩子：你怎麼知道是這個改動讓它變好的，而不是別的原因？", "鼓勵他先大聲說出「我猜這次會……」，做完再對照，不管猜中沒猜中都很有用。", "如果某次越改越糟，問他要不要改回去，還是順著這個壞結果再試一個新點子。"], "dont": ["別替他決定要改哪裡，也別在他失敗時急著示範「正確做法」。", "別問「做好了沒」，過程裡的每一次調整都算數，不必有完成品。"]}, "source": {"type": "research-derived", "citation": "Karen Worth (2010)〈Science in Early Childhood Classrooms: Content and Process〉，SEED Conference Papers，Early Childhood Research & Practice (ECRP) Vol. 12, No. 2 — 兒童透過動手探究循環（探索、預測、觀察、記錄、找規律）與反覆測試精修來建構科學推理"}, "tags": ["scaleup-10to11", "改良與測試", "動手與感官", "單一變項", "迭代測試"], "language": "zh-Hant-TW"}, {"id": "MAK0000010", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "動手與感官", "sub_category": "拆解理解", "question_type": "沈思題", "action_icon": "star", "question": "找一個壞掉或沒在用的東西，想想它裡面可能長什麼樣、哪個地方先壞的。如果讓你重新設計一個，你會把哪裡做得不一樣？", "parent": {"context": "拆解與「逆向想像內部結構」能練到看不見之處的推理——這個年紀的孩子已能根據外觀和功能，推測裡面看不到的零件怎麼配合。〔執行前提〕先確認那個東西安全（不要是插電的、有電池漏液的、有刀片或玻璃的）；若手邊沒有可拆的，也可以單純對著一支舊筆、一個夾子，想像它內部怎麼運作，光用想的也完全可以。", "extensions": ["問他：你覺得設計這個的人，當初最在意的是什麼？", "讓他畫出他「猜」的內部構造，之後若真能安全打開，再對照差在哪。", "把話題延伸到別的東西：那雨傘呢？拉鍊呢？哪個你最想拆開看看？"], "dont": ["別急著告訴他「裡面其實是這樣」，他猜錯的版本往往藏著更好的問題。", "別評論他的重新設計切不切實際，這裡要的是想像，不是工程圖。"]}, "source": {"type": "research-derived", "citation": "Bärbel Inhelder & Jean Piaget (1958). The Growth of Logical Thinking from Childhood to Adolescence: An Essay on the Construction of Formal Operational Structures (A. Parsons & S. Milgram, Trans.). New York: Basic Books."}, "tags": ["scaleup-10to11", "拆解理解", "動手與感官", "逆向推理", "假設想像"], "language": "zh-Hant-TW"}, {"id": "MAK0000011", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "動手與感官", "sub_category": "相似感官分辨", "question_type": "行動題", "action_icon": "hand", "question": "請家裡的人準備兩樣很像的東西讓你蒙眼分辨——像兩種白色的粉、兩種敲擊聲、兩杯不同的水。分完後問問他：你是用哪個小地方分出來的？", "parent": {"context": "辨認「很像但不一樣」需要孩子同時注意好幾個細微線索、再找出關鍵差異，比單純「這是什麼味道」高了一層。和人一起設計與對話，也讓感官練習變成可以討論的事。〔執行前提〕請大人避開有刺激性或可能過敏的東西（生辣椒粉、來路不明的粉末別用）；若不方便弄味道，改成兩種很像的聲音或兩種布料的觸感一樣好玩。", "extensions": ["問他：如果只剩一種感官（只能聞、不能摸），你還分得出來嗎？", "換他出題給大人猜，看大人是用哪個線索分辨的，兩人比一比。", "聊聊：有沒有哪一組你怎麼試都分不出來？那它們是不是其實差不多？"], "dont": ["別在他猜錯時公布「正確答案」就結束，問他「再給一次機會你想先試哪個」。", "別把它變成考試式的計分，重點是他怎麼描述那個「差一點點」的地方。"]}, "source": {"type": "research-derived", "citation": "Maria Montessori《The Montessori Method》(Frederick A. Stokes Company, New York, 1912) — 透過配對與分辨高度相似的感官刺激來精煉知覺辨別力"}, "tags": ["scaleup-10to11", "相似感官分辨", "動手與感官", "知覺辨別", "找差異"], "language": "zh-Hant-TW"}, {"id": "BOD0000010", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "身體與健康", "sub_category": "運動與身體", "question_type": "行動題", "action_icon": "eye", "question": "下次活動時試兩種不一樣的動作（像快走和跳躍），留意身體哪裡先累、哪裡先喘，再想想為什麼是那裡先。", "parent": {"context": "10-11 歲的孩子已經能同時觀察兩三件事、找出規律，比起小小孩單純感覺心跳變快，他們開始能把「不同動作」和「不同部位的反應」連起來推理。這張卡不是要正確答案，是邀請孩子把自己的身體當成可以觀察的對象。〔執行前提〕需要一點活動空間；若孩子當天不想動，可改成回想最近一次跑步或爬樓梯的感覺，一樣能聊。", "extensions": ["如果換成游泳或騎車，先累的地方會不會不一樣？為什麼？", "喘和累是同一件事嗎，還是身體在用兩種方式告訴你不同的事？", "運動員是怎麼讓某個部位變得比較不容易累的？"], "dont": ["別急著糾正孩子說錯肌肉名稱，他怎麼描述都算數。", "別把它變成體能測驗或比誰撐得久。"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["scaleup-10to11", "身體覺察", "運動", "因果推理"], "language": "zh-Hant-TW"}, {"id": "BOD0000011", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "身體與健康", "sub_category": "食物與能量", "question_type": "沈思題", "action_icon": "star", "question": "想想看，吃了不一樣的東西之後，身體的感覺有沒有差別——有時候特別有精神、有時候很快又餓了。如果這背後有個規律，你猜會是什麼？", "parent": {"context": "這個年紀的孩子開始能做「如果…那麼…」的假設推理，把分散的經驗串成一個猜想。重點是好奇而不是飲食控制——我們談的是「身體吃進不同東西後的感覺」，不是哪種食物好或不好。請務必避開任何關於份量、體重或外型的話題，只停在「你注意到什麼」。", "extensions": ["同樣一種食物，在不同時間吃，感覺會一樣嗎？", "你怎麼分辨是真的餓，還是只是想吃東西？", "如果要驗證你的猜想，你會怎麼觀察自己？"], "dont": ["別把任何食物講成好或壞、該吃或不該吃。", "別接到熱量、份量或身材的話題上。"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["scaleup-10to11", "身體覺察", "食物與能量", "假設推理"], "language": "zh-Hant-TW"}, {"id": "BOD0000012", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "身體與健康", "sub_category": "生病與復原", "question_type": "行動題", "action_icon": "mouth", "question": "下次你或家人生病時，問問身體這時候在做哪些事（像發燒、想睡、不太想吃），這些是在幫忙、還是在拖累？你又能怎麼配合它？", "parent": {"context": "10-11 歲的孩子能理解身體是一個會主動運作的系統，不只是「壞掉等修好」，這比小小孩多了一層「身體在為我做事」的推理。〔執行前提〕生病可能讓孩子焦慮或不舒服，不要在他很難受時硬聊；可等復原期、或拿家人、甚至寵物生病的經驗來談。可以的話找大人或一起查資料，但重點是孩子自己的猜想，不是背正確解釋。", "extensions": ["發燒讓人不舒服，但它有沒有可能其實在幫忙？", "為什麼生病時身體常常想睡、不太想動？", "你能做哪些事是在幫身體，哪些反而是在拖它後腿？"], "dont": ["別把它變成醫學知識問答或要孩子記住術語。", "別在孩子正難受、焦慮時硬要他思考或回答。"]}, "source": {"type": "research-derived", "citation": "兒童健康素養（health literacy）研究 — 學齡中期兒童對身體自我修復歷程的理解，以及培養照顧自己身體的能動性（agency）。相關實證可參 Bibace & Walsh（1980/1981，兒童疾病概念六階段發展模型，生理/心理生理理解始於約 11 歲形式運思期）與 Myant & Williams（2005, Journal of Health Psychology）兒童對疾病/受傷理解隨年齡精緻化之研究。"}, "tags": ["scaleup-10to11", "身體覺察", "生病與復原", "自我照顧能動性"], "language": "zh-Hant-TW"}, {"id": "SOC0000012", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "人與社會", "sub_category": "幫忙這件事", "question_type": "行動題", "action_icon": "hand", "question": "今天找一個你看到正在忙的人，去幫上一件小小的事，例如遞一個東西、扶一下門。做完以後，看看接下來發生了什麼。", "parent": {"context": "九歲的孩子開始能把「幫忙」從被交代的任務，變成自己主動發起的行動。這張卡不問「你應該要幫忙」，而是邀請孩子做一件具體的小事，然後留意對方和自己身上的細微變化——幫忙之後的世界長什麼樣子，比幫忙本身更值得看。", "extensions": ["幫完之後，那個人的表情或動作有沒有不一樣？", "回想一下，今天有沒有誰也幫了你一件小事，是什麼？", "如果對方沒有說謝謝，幫忙這件事還算不算發生了？"], "dont": ["不用替孩子安排「應該去幫誰」，讓孩子自己找到那個人。", "孩子幫的事很小或看起來沒用，也不要評論大小，那是他選的。"]}, "source": {"type": "research-derived", "citation": "William Damon (1988). The Moral Child: Nurturing Children's Natural Moral Growth. New York: The Free Press."}, "tags": ["人與社會", "幫忙", "互助", "9歲", "fill-holes-s4"], "language": "zh-Hant-TW"}, {"id": "SOC0000013", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "人與社會", "sub_category": "聽出來的心情", "question_type": "行動題", "action_icon": "ear", "question": "今天找一個正在說話的人，先不看他的臉，只用耳朵聽他的聲音，猜猜看他現在是什麼心情。聽完再去看看，你猜的和他真正的樣子像不像。", "parent": {"context": "九歲的孩子已經能從表情讀情緒，這張卡把線索收窄到只剩聲音——語速、音量、停頓、語尾，逼出更細的聆聽。重點不在猜得準不準，而在孩子發現「光靠聽，原來也能知道這麼多，又有些地方猜不到」。可以在家人講電話、路上、店裡都試。", "extensions": ["讓你覺得他是這個心情的，是聲音的哪個地方——快慢、大小聲、還是停頓？", "同樣一句話，用不同的聲音說出來，心情會不會就變了？", "有沒有哪一次，聲音聽起來很平靜，但其實心情不是那樣？"], "dont": ["不用糾正孩子猜得對不對，猜錯也是一種發現。", "別要求孩子去打擾正在認真說話的人，遠遠地聽就可以。"]}, "source": {"type": "research-derived", "citation": "Robert L. Selman (1980) The Growth of Interpersonal Understanding: Developmental and Clinical Analyses, Academic Press —兒童觀點取替能力從外顯線索逐步發展到推測他人內在狀態。"}, "tags": ["人與社會", "情緒辨識", "聆聽", "觀點取替", "9歲", "fill-holes-s4"], "language": "zh-Hant-TW"}, {"id": "SOC0000014", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "人與社會", "sub_category": "玩之前要不要先講好", "question_type": "沈思題", "action_icon": "star", "question": "想一個你玩過的遊戲，如果大家開始玩之前都沒有先講好規則，玩到一半可能會發生什麼事。如果規則是你來定，你會先講好哪一條。", "parent": {"context": "九歲的孩子玩團體遊戲時常會撞上「不公平」的爭執，這張卡把那個經驗拉出來想一想：規則不是大人硬塞的，而是一群人為了能一起玩下去所做的約定。讓孩子從「沒規則會怎樣」反過來體會規則的用處，比直接說「要守規矩」更接近他自己的發現。", "extensions": ["你先講好的那條規則，是想擋掉哪一種會吵架的狀況？", "如果玩到一半有人想改規則，可以嗎，要怎麼改？", "有沒有一種遊戲，其實不太需要規則也能玩？"], "dont": ["不用把這題導向「所以你在學校也要守規矩」，那會讓想像縮回說教。", "孩子想出很奇怪的規則也別否定，奇怪的規則正好可以拿來想會發生什麼。"]}, "source": {"type": "research-derived", "citation": "Herbert P. Ginsburg & Sylvia Opper (1988) Piaget's Theory of Intellectual Development, 3rd ed., Prentice-Hall, Englewood Cliffs, NJ."}, "tags": ["人與社會", "規則", "遊戲", "公平", "9歲", "fill-holes-s4"], "language": "zh-Hant-TW"}, {"id": "MAK0000012", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "動手與感官", "sub_category": "聲音的高低從哪裡來", "question_type": "沈思題", "action_icon": "ear", "question": "找一樣會發出高音、一樣會發出低音的東西，仔細聽，再想想看是什麼樣的差別讓一個聽起來尖、一個聽起來厚。你覺得如果把同一樣東西變大或變小，聲音會往哪個方向走。", "parent": {"context": "十二歲的孩子開始能在「現象」和「背後的原因」之間架橋。聲音的高低牽涉到振動的快慢、物體的大小與長短——這些是看不見、卻可以從聽覺推回去的線索。問這題不是要他答出物理名詞，是邀請他把耳朵聽到的差別，連回某個可推理的變因。", "extensions": ["如果他卡住，可以一起找兩條粗細不同的橡皮筋、或長短不同的水瓶，邊敲邊聽，看變因和聲音怎麼一起動。", "把話題從樂器拉到生活：大狗和小狗的叫聲、大鐘和小鈴鐺，是不是也藏著同一個規律。", "反過來問：有沒有又大又發高音的東西，打破了他剛剛猜的規律，那會是什麼讓它例外。"], "dont": ["別急著告訴他「因為振動頻率」這個答案，名詞會關掉他自己推理的路。", "別把他的猜測判成對或錯，就算規律被例外推翻，那個推翻本身也是收穫。"]}, "source": {"type": "research-derived", "citation": "Karen Worth (2010). Science in Early Childhood Classrooms: Content and Process. Early Childhood Research & Practice (ECRP), Vol 12 No 2 (Fall 2010), SEED Conference collected papers."}, "tags": ["fill-holes-s4", "聲音物理", "聆聽", "推理", "12歲"], "language": "zh-Hant-TW"}, {"id": "MAK0000013", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "動手與感官", "sub_category": "工具為什麼長這個樣子", "question_type": "沈思題", "action_icon": "eye", "question": "挑一樣你常用的工具，剪刀、湯匙或門把都行，看看它哪裡彎、哪裡粗、哪裡留了洞。你覺得當初設計它的人，是為了解決什麼問題才把它做成這個形狀。", "parent": {"context": "東西的形狀很少是隨便長成的，背後常藏著設計者在「好不好握、安不安全、省不省料」之間做的取捨。十二歲的孩子已經能從一個物件的樣子，反推出別人沒說出口的考量——這是同理與推理的合體。", "extensions": ["拿同一類工具的不同版本對照，例如大人的剪刀和兒童安全剪刀，看形狀的差別對應到什麼不同的考量。", "問他：如果這個工具是給左手的人、或給力氣很小的人用，哪裡會需要改。", "把目光移到他每天用的東西——牙刷、書包扣環，找一個他從沒注意過卻其實被設計過的細節。"], "dont": ["別把它變成「猜出標準答案」的測驗，設計者的考量本來就可能有好幾種。", "別替他下結論說某個設計比較笨，先聽他推測那個形狀想解決的是什麼。"]}, "source": {"type": "research-derived", "citation": "Donald A. Norman (2013) The Design of Everyday Things: Revised and Expanded Edition, Basic Books — affordance 與設計取捨：物件的形狀透露使用方式與設計者在多重需求間的權衡。"}, "tags": ["fill-holes-s4", "設計取捨", "觀察", "form-follows-function", "12歲"], "language": "zh-Hant-TW"}, {"id": "MAK0000014", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "動手與感官", "sub_category": "怎麼搭才站得最穩", "question_type": "行動題", "action_icon": "hand", "question": "用手邊任何能疊的東西，書本、積木、紙杯都好，試著搭出一個又高又不容易倒的結構。一邊搭一邊感覺，是哪一個動作讓它突然變穩、或突然變晃。", "parent": {"context": "〔執行前提〕需要一些能堆疊的物品，書本或紙杯都行；若手邊真的沒有，改用幾枝筆交疊也能感覺到平衡。穩定牽涉到重心、底面大小、重量怎麼分配——這些十二歲的孩子可以一邊動手一邊推理，從晃和穩的瞬間找出規律。", "extensions": ["故意把它弄倒幾次，問他每次倒的方向不一樣，是被什麼決定的。", "比較看看：底座寬一點和窄一點、重的放下面和放上面，哪個改變對穩定影響最大。", "如果他搭出了得意的作品，邀他想想真實世界裡的橋或高塔，是不是用了他剛發現的同一招。"], "dont": ["別在他試的時候糾正「這樣才對」，倒下來的那一刻往往比成功更能讓他看懂原因。", "別把它導向比賽誰搭得高，重點是他有沒有摸到讓結構變穩的那個變因。"]}, "source": {"type": "research-derived", "citation": "Karen Worth (2010). Science in Early Childhood Classrooms: Content and Process. SEED (STEM in Early Education and Development) Collected Papers, Early Childhood Research & Practice (ECRP)."}, "tags": ["fill-holes-s4", "結構與平衡", "動手做", "重心", "12歲"], "language": "zh-Hant-TW"}, {"id": "BOD0000013", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "身體與健康", "sub_category": "餓與飽", "question_type": "沈思題", "action_icon": "heart", "question": "肚子餓的時候，身體是哪裡先讓你知道的？吃飽了的那種感覺，又是從哪裡冒出來的？", "parent": {"context": "9 歲開始能把「身體裡面的感覺」當成一件可以觀察的事，而不只是直接反應。餓和飽是每天都發生、卻很少被停下來想的內在訊號。這題沒有標準答案——有人說是肚子叫、有人說是沒力氣、有人說是嘴饞，都算數。讓他描述「感覺從哪來」，比給他生理解釋更有價值。", "extensions": ["下次他喊餓時，問他：這次的餓，和昨天那次一樣嗎？哪裡不一樣", "跟他聊：肚子叫一定代表餓嗎？不叫就一定不餓嗎", "反問：吃飽了，是肚子先知道，還是嘴巴先不想吃了"], "dont": ["急著解釋「血糖」「胃」這些名詞當答案", "用「你又不是真的餓」否定他描述的感覺"]}, "source": {"type": "research-derived", "citation": "Bibace, R., & Walsh, M. E. (1980). Development of children's concepts of illness. Pediatrics, 66(6)."}, "tags": ["fill-holes-s4", "身體與健康", "餓與飽", "內在覺察", "9歲"], "language": "zh-Hant-TW"}, {"id": "BOD0000014", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "身體與健康", "sub_category": "身體的保護反應", "question_type": "行動題", "action_icon": "hand", "question": "找一個你還沒決定、身體就先動了的時刻——手碰到冰水就縮回來、有東西突然飛到眼前就閉眼。試試看，能不能故意叫它不要動？做得到還是做不到，都很有意思。", "parent": {"context": "〔執行前提〕只用安全的方式試：在眼前輕揮手看會不會眨、手指碰一下冰塊或冷水。若家裡沒有冰，改成「有人假裝要碰你眼睛時你會不會眨」也可以，不需要任何器材。9 歲喜歡用身體去試、去比對。這題讓他發現身體有些動作不歸「你」管——這個發現本身就夠他想很久，不必導向結論。", "extensions": ["試完後問他：那個動作是誰決定的？如果不是你，是誰", "換一種試試：聽到很大的聲音時身體會怎樣，那也是自動的嗎", "跟他聊：身體幫你做這些事，可是都不先問你，你覺得這樣好嗎"], "dont": ["叫他去碰真的燙的、尖的或危險的東西來試", "直接講「這叫反射神經」把問題收掉"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Prentice-Hall."}, "tags": ["fill-holes-s4", "身體與健康", "身體的保護反應", "動手試", "9歲"], "language": "zh-Hant-TW"}, {"id": "MON0000013", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "金錢與選擇", "sub_category": "貴與便宜", "question_type": "行動題", "action_icon": "eye", "question": "去找兩個很像、價錢卻差很多的東西，仔細看看它們哪裡不一樣。", "parent": {"context": "九歲的孩子開始注意到「同一種東西，價錢卻不一樣」。讓他用眼睛去比較，比直接告訴他答案更能長出自己的判斷。〔執行前提〕在家裡的櫃子、冰箱就能找（兩瓶醬油、兩包餅乾、兩支筆）；出不了門時，看包裝上的字、摸材質、聞味道都算。", "extensions": ["問他：你覺得貴的那個，多花的錢換到了什麼？", "找一個大人，問問他買東西時會不會挑貴的，為什麼。", "下次逛店時，讓他自己挑一樣東西，說說看為什麼挑這個。"], "dont": ["別急著告訴他「貴的比較好」或「便宜的划算」，讓他自己看出差別。", "別把這變成省錢教育，他只是在觀察，不是在被教怎麼花錢。"]}, "source": {"type": "research-derived", "citation": "Anna E. Berti & Anna S. Bombi (1988). The Child's Construction of Economics. Cambridge University Press."}, "tags": ["fill-floor-s5", "金錢與選擇", "9歲", "貴與便宜", "觀察"], "language": "zh-Hant-TW"}, {"id": "MON0000014", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "金錢與選擇", "sub_category": "現在還是以後", "question_type": "沈思題", "action_icon": "star", "question": "同樣一筆錢，現在花掉、和先存著等以後再用，後來會變得不一樣嗎。你想像一下，哪一種以後的你會比較滿意。", "parent": {"context": "十二歲的孩子開始能在腦中比較「現在的自己」和「未來的自己」這兩個還沒發生的選項。這張卡不是要他學會儲蓄，而是讓他體會「同一筆錢放在不同時間點，價值感受可能會變」這件抽象的事，並連回他真正花過或存過的經驗。", "extensions": ["如果他舉了具體例子，可以接著問：那次你後來覺得值得嗎，是什麼讓你這樣覺得。", "可以聊聊「等待」本身有沒有代價，例如等的時候想要的東西不見了、或漲價了。", "問問看有沒有哪種東西反而是越早花越好，而不是越晚越好。"], "dont": ["別把它導向「所以要多存錢」這種結論，存或花沒有對錯。", "別拿他過去亂花錢的事來舉例或暗示後悔。"]}, "source": {"type": "research-derived", "citation": "Anna E. Berti & Anna S. Bombi (1988) The Child's Construction of Economics, Cambridge University Press"}, "tags": ["金錢與選擇", "現在還是以後", "12歲", "沈思題", "fill-floor-s5"], "language": "zh-Hant-TW"}, {"id": "MON0000015", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "金錢與選擇", "sub_category": "買不到的東西", "question_type": "沈思題", "action_icon": "heart", "question": "有些東西好像再多錢也買不到。你心裡浮現了哪幾樣，它們為什麼買不到呢。", "parent": {"context": "十二歲的孩子能開始抽象思考「金錢的界線在哪裡」，而不只是想要什麼。這張卡邀請他往內感受那些無法用價格衡量的東西，並試著說出原因，把抽象的「買不到」連回他自己重視的具體事物。", "extensions": ["如果他說出某樣東西，可以陪他想：那它是怎麼來的，如果不是用買的。", "可以聊聊有沒有那種「看起來能用錢換、其實換不到真的」的東西。", "問問他，知道有些東西買不到，會不會改變他看待金錢的方式。"], "dont": ["別預設「親情、健康」這類標準答案，由他自己浮現。", "別把他說的某樣東西評為太天真或不對。"]}, "source": {"type": "research-derived", "citation": "Anna E. Berti & Anna S. Bombi (1988) The Child's Construction of Economics, Cambridge University Press"}, "tags": ["金錢與選擇", "買不到的東西", "12歲", "沈思題", "fill-floor-s5"], "language": "zh-Hant-TW"}, {"id": "LOG0000015", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "邏輯與謎題", "sub_category": "編碼與規則", "question_type": "行動題", "action_icon": "hand", "question": "自己訂一套規則，把一句話變成一串別人看不懂的記號，再交給家人，看他們有沒有辦法照規則把它解回來。", "parent": {"context": "十二歲的孩子開始能在腦中操作一整套抽象規則，而不只是處理眼前的具體事物。自己設計一套編碼方式、再請別人逆著規則解開，等於同時做了「建立系統」和「反向推理」兩件事——這正是這個年紀剛萌芽的形式運思最喜歡的遊樂場。重點不在密碼多難破，而在他發現「規則一旦講清楚，別人就能照著走」這件事本身。〔執行前提〕需要一個願意一起玩的人；如果當下沒有人，他也可以把規則和密文寫下來，留給晚一點回來的人解。", "extensions": ["如果家人一下就解開了，問問他是靠什麼線索看穿規則的", "換家人出一套規則考他，看看別人的想法跟他有什麼不一樣", "試試看不靠任何說明，只給幾組「原文配密文」的例子，對方能不能自己猜出規則"], "dont": ["教他「正確」的密碼做法，或說某套規則比較聰明", "嫌他的規則太簡單或太亂，急著幫他改"]}, "source": {"type": "research-derived", "citation": "Bärbel Inhelder & Jean Piaget (1958) The Growth of Logical Thinking from Childhood to Adolescence: An Essay on the Construction of Formal Operational Structures, Basic Books — 形式運思期能脫離具體內容、在心中建構並操作抽象規則系統，並具可逆的心智運思（reversibility）"}, "tags": ["fill-floor-s5", "邏輯與謎題", "12歲", "編碼與規則", "行動題"], "language": "zh-Hant-TW"}, {"id": "LOC0000021", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "本土文化", "sub_category": "全球化與在地共存", "question_type": "行動題", "action_icon": "mouth", "question": "去問一位開了很久的在地小店主人，和一位常逛連鎖店或網購的人：一條街全變成連鎖店，會少了什麼、又會多了什麼？把兩種說法都帶回來，看看它們在哪裡互相矛盾、又在哪裡其實都有道理。", "parent": {"context": "全球化讓選擇變多、價格變低，也可能讓不同地方愈來愈像。這個年紀的你已經能同時握住「方便」和「特色」兩種價值，不必急著判定哪一邊才對。讓你去問不同立場的人，是因為一個人的答案很難涵蓋整件事的張力。〔執行前提〕若不方便找到開很久的店主人，plan B 是訪問家裡長輩和一位同學，問他們同一個問題。", "extensions": ["可以追問：消失的東西，有沒有可能用新的方式留下來，而不只是原樣保存？", "可以注意：兩個人的答案，是不是和他們的年紀、工作、住的地方有關？", "可以延伸到語言或食物：除了店面，還有什麼在地的東西正在變得稀少？"], "dont": ["別急著替他們下結論說誰想得比較對，先把兩種說法完整聽完。", "別把這題變成『該不該抵制連鎖店』的選邊，重點是看見多種角度同時成立。"]}, "source": {"type": "research-derived", "citation": "Norma González, Luis C. Moll & Cathy Amanti (Eds.) (2005)《Funds of Knowledge: Theorizing Practices in Households, Communities, and Classrooms》, Routledge"}, "tags": ["本土文化", "全球化與在地", "多重視角", "13-18", "fill-floor-s5"], "language": "zh-Hant-TW"}, {"id": "NAT0000015", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "自然與宇宙", "sub_category": "牽一髮的整體", "question_type": "沈思題", "action_icon": "star", "question": "如果有人移走了一座森林裡看起來最不重要的一種小生物，你想像得到這個改變最後可能繞回來，影響到什麼跟它好像完全無關的東西嗎？", "parent": {"context": "形式運思期的孩子開始能在腦中追蹤一條因果鏈，並推想它如何彎折、回饋、放大。這題不是要他背出某個生態案例，而是邀請他把「自然」當成一個彼此牽動的系統來想像：一個看似微小的改變，可能透過好幾層連結，繞到一個沒人預料的地方。重點是那份「原來什麼都連著什麼」的驚奇，不是答對某條食物鏈。", "extensions": ["問他：這條影響的鏈子，會不會繞著繞著又回到那個小生物自己身上？", "聊聊：人做的某件事，有沒有也是這樣繞了一圈才回到人身上的？", "一起想：是不是有些連結，要等很久很久之後才看得出來？"], "dont": ["別把它導向「所以我們要保護環境」這類結論，那會把開放的想像收成一句口號。", "別糾正他想的鏈子「不科學」或「不會真的這樣」——這裡要的是推想的勇氣，不是正確答案。"]}, "source": {"type": "research-derived", "citation": "Donella H. Meadows (2008)《Thinking in Systems: A Primer》— 系統中的回饋環路與非線性連動，一個元素的改變如何波及整個系統"}, "tags": ["fill-floor-s5", "自然與宇宙", "13-18", "系統思考", "沈思題"], "language": "zh-Hant-TW"}, {"id": "SOC0000015", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "人與社會", "sub_category": "看見與被看見", "question_type": "沈思題", "action_icon": "star", "question": "同一件事在不同地方流傳，有的說法傳得又快又遠，有的幾乎沒人聽到。一個說法傳得快，是因為它比較接近真的，還是因為別的原因？", "parent": {"context": "13 到 18 歲開始能跳出單一說法，去想「我為什麼會看到這個、而看不到那個」。這張卡不問哪則訊息是對的，而是邀請孩子分開兩件常被混在一起的事：一個說法傳得廣，和它是不是接近事實，未必是同一回事。背後沒有標準答案，重點是讓他自己去想，是什麼讓某些聲音被放大、某些被蓋過。", "extensions": ["如果一個說法讓人很驚訝、很生氣，這會讓它更容易被轉出去嗎？驚訝跟可信，是同一件事嗎？", "想想看，誰決定了你會先看到哪些消息？是你自己、是身邊的人，還是別的什麼？", "有沒有一種說法，因為太平淡、太麻煩解釋，反而很少人去傳？那它就比較不重要嗎？"], "dont": ["別急著替孩子判定哪則訊息是假的、哪則是真的，這會把開放的思辨收成一個正解。", "別把話題導向某個立場或某群人，重點是傳播本身怎麼運作，不是誰對誰錯。"]}, "source": {"type": "research-derived", "citation": "Robert L. Selman (1980). The Growth of Interpersonal Understanding: Developmental and Clinical Analyses. Academic Press."}, "tags": ["人與社會", "13-18", "媒體與真相", "fill-floor-s5", "沈思題"], "language": "zh-Hant-TW"}, {"id": "MAK0000015", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "動手與感官", "sub_category": "內隱技藝", "question_type": "沈思題", "action_icon": "star", "question": "想一件你已經做到不用思考的事，騎車、打字或某個手上的動作。當初要費力學的東西，現在去了哪裡，又是身體的哪個部分替你記著？", "parent": {"context": "青少年正在大量累積「會了就不必再想」的技能，但很少回頭看這種轉變本身。這題邀請你把注意力放在「熟練」這件事的內部，而不是技能本身——一種知道卻說不太出來的知識，是怎麼從費力變成自動的。沒有標準答案，連專家也未必說得清自己怎麼做到的。", "extensions": ["如果現在要把這個動作一步步教給完全不會的人，你會發現哪些步驟其實講不出來、只能示範？", "拆解開來想：是手在記、眼在記，還是某種你叫不出名字的感覺在記？", "有沒有哪一刻你「想太多」反而做不好了？那說明思考和身體之間是什麼關係？"], "dont": ["別急著替孩子總結成「這就是肌肉記憶啦」，那會把一個值得停留的問題壓扁成一個名詞。", "別評論他選的技能太簡單或不夠厲害，重點是他怎麼觀察自己的「會」。"]}, "source": {"type": "research-derived", "citation": "Michael Polanyi (1966)《The Tacit Dimension》—內隱知識：我們知道的比我們能說出來的更多（we can know more than we can tell）"}, "tags": ["fill-floor-s5", "13-18", "內隱技藝", "後設認知", "身體知識", "沈思題"], "language": "zh-Hant-TW"}, {"id": "BOD0000015", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "身體與健康", "sub_category": "注意力與分心", "question_type": "行動題", "action_icon": "eye", "question": "接下來一小時，留意每一次你的注意力被什麼拉走、又是被什麼拉回來的；事後想想，那些打斷你的東西，是你選的，還是別人替你設計好的。", "parent": {"context": "這個年紀，很多 App、通知、紅點、自動播放，到底是順手出現、還是被設計來抓住你的注意力，常常不容易分辨——這正是值得你自己去看清楚的地方。讓你觀察自己被拉走、拉回的真實過程，不是要你戒掉什麼，而是把「我的注意力此刻在哪、由誰決定」這件事，從自動變成你看得見、能評估的事。〔執行前提〕若此刻靜不下來或正被事情追著，可改在比較鬆的時段做；不必勉強守滿一小時，留意到兩三次轉移就夠出發了。", "extensions": ["把「被外面拉走」和「自己分心走神」分開看——兩者感覺一樣嗎？哪一種比較難拉回來？", "如果一個 App 設計得讓你更難放下，這是它的問題、你的問題，還是兩者之間的某種拉扯？", "你會想為自己的注意力設下什麼界線嗎？還是你覺得根本不需要？"], "dont": ["別急著下載專注 App 或關掉所有通知——先看清楚自己現在到底怎麼分心的。", "別把分心當成意志力不夠的證據來責怪自己；設計本來就在跟你的大腦拔河。"]}, "source": {"type": "research-derived", "citation": "Charles Duhigg (2012) The Power of Habit: Why We Do What We Do in Life and Business, Random House — 提示（cue）觸發自動反應的習慣迴路；兒少健康素養中對自身身體與行為的覺察"}, "tags": ["身體與健康", "注意力與分心", "13-18歲", "agency", "後設認知", "fill-floor-s5"], "language": "zh-Hant-TW"}, {"id": "SPI0000022", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "靈性", "sub_category": "宇宙大哉問", "question_type": "沈思題", "action_icon": "star", "question": "如果你飛到最遠的那片天空後面，那裡會是什麼樣子？你猜猜看。", "parent": {"context": "六到八歲的孩子開始會問「再過去呢」這種沒有盡頭的問題，這正是驚奇感在萌芽。這張卡不要答案，只要孩子敢往沒人去過的地方想像。讓他天馬行空，你不用糾正「其實宇宙是…」。", "extensions": ["問他那裡有沒有顏色、有沒有聲音、會不會冷", "你也說一個自己的猜想，跟他的不一樣也沒關係", "隔幾天再問一次，看看他的猜想有沒有變"], "dont": ["不要急著用科學知識告訴他正確答案", "不要說他想的東西不可能"]}, "source": {"type": "research-derived", "citation": "David Hay & Rebecca Nye (2006). The Spirit of the Child (Revised Edition). London: Jessica Kingsley Publishers."}, "tags": ["thicken-6to8-s6", "宇宙大哉問", "6-8", "star", "沈思題"], "language": "zh-Hant-TW"}, {"id": "SPI0000023", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "靈性", "sub_category": "身體的暖意", "question_type": "沈思題", "action_icon": "heart", "question": "你最開心的時候，身體哪一個地方會暖暖的、熱熱的？", "parent": {"context": "開心、興奮這些感受其實住在身體裡，但孩子很少被邀請去注意。這張卡帶他把情緒和身體連起來，是覺察自己的第一步。重點是他自己的感覺，不是你覺得應該在哪裡。", "extensions": ["問他那個暖暖的地方，是大大的還是小小的", "問他難過的時候，身體又是什麼感覺", "你也分享自己開心時身體哪裡有反應"], "dont": ["不要說「應該是心裡啦」幫他決定答案", "不要因為他說不出來就覺得他答錯"]}, "source": {"type": "research-derived", "citation": "David Hay & Rebecca Nye (2006) The Spirit of the Child (Revised Edition), Jessica Kingsley Publishers — 兒童靈性的「覺察感知」(awareness sensing)：留意當下、調諧於身體與內在感受的能力。"}, "tags": ["thicken-6to8-s6", "身體的暖意", "6-8", "heart", "沈思題"], "language": "zh-Hant-TW"}, {"id": "LNG0000022", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "語文", "sub_category": "相反的詞", "question_type": "行動題", "action_icon": "hand", "question": "想一對意思剛好相反的詞，例如「高」和「矮」。用你的身體把這兩個詞各比一個樣子給家人看。", "parent": {"context": "六到八歲的孩子開始能感覺到詞和詞之間有對立關係，但用嘴巴說「相反」還很抽象。把一對反義詞用身體比出來，等於把抽象的語意變成看得見、做得出來的動作，孩子是在用全身理解語言。重點不在比得標不標準，而在他怎麼決定「相反要怎麼演」。", "extensions": ["比完一對，問問家人能不能猜到你比的是哪兩個詞", "換家人比、你來猜，看看你們想到的相反詞一不一樣", "有沒有哪個詞，你怎麼想都想不到它的相反？把它說出來聊聊"], "dont": ["不要糾正他比的姿勢「對不對」，他怎麼演都是他的理解", "不要急著報出一長串反義詞讓他背，一對就夠玩很久"]}, "source": {"type": "research-derived", "citation": "Jean-Émile Gombert (1992)《Metalinguistic Development》, University of Chicago Press —兒童對語意關係（含反義）的後設語言覺察隨年齡逐步發展，metasemantic 能力約於 6-7 歲萌芽"}, "tags": ["thicken-6to8-s6", "語文", "反義詞", "身體", "6-8歲"], "language": "zh-Hant-TW"}, {"id": "LNG0000023", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "語文", "sub_category": "只剩三個詞", "question_type": "沈思題", "action_icon": "star", "question": "想像有一天你只能用三個詞跟家人說話，別的詞都暫時藏起來了。你會留下哪三個？只用這三個詞，你要怎麼讓家人知道你肚子餓了？", "parent": {"context": "這題請孩子想像語言被拿掉大半後的世界，逼他去感覺「哪些詞對我最重要」以及「不靠詞還能怎麼溝通」。六到八歲的孩子能玩這種具體的假設想像，過程中他會自然想到表情、手勢、聲音這些不說話的辦法。重點是他選詞的理由，以及他如何想像在缺詞時還能被懂。", "extensions": ["問問他，為什麼是這三個詞，捨不得的是哪一個", "聊聊只用這三個詞，要怎麼告訴別人「我肚子餓了」", "換你也選三個詞，比比看你們留下的一不一樣"], "dont": ["不要評論他選的詞「有沒有用」，那是他的世界他作主", "不要把它變成考試，問完就要他寫下來或記住"]}, "source": {"type": "research-derived", "citation": "Jean-Émile Gombert (1992) Metalinguistic Development, University of Chicago Press — 後設語言發展含對「詞的功能」與語意/語用的覺察。"}, "tags": ["thicken-6to8-s6", "語文", "想像", "溝通", "6-8歲"], "language": "zh-Hant-TW"}, {"id": "LOC0000022", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "本土文化", "sub_category": "長輩會唱的歌", "question_type": "行動題", "action_icon": "ear", "question": "去找一位長輩，請他唱一首小時候會唱的歌給你聽。聽完，記住其中一句你最喜歡的。", "parent": {"context": "長輩腦中藏著沒寫進課本的歌——童謠、老歌、田裡哼的調子。讓孩子用耳朵接住這些聲音，是把家族的聲音記憶傳下去，比歌詞內容本身更珍貴。〔執行前提〕若身邊長輩不方便或不願唱，plan B 是請長輩用說的、把歌詞唸一段，或哼出旋律也算。", "extensions": ["問問這首歌是誰教長輩唱的，那時候他幾歲。", "聽聽看這首歌是開心的、想睡的、還是想念誰的。", "下次你也可以把這句唱給別人聽，看看他有沒有聽過。"], "dont": ["別急著要孩子把整首歌背起來或唱對。", "別糾正長輩唱錯字或走音，跑掉的調子也是這首歌的一部分。"]}, "source": {"type": "research-derived", "citation": "Norma González, Luis C. Moll & Cathy Amanti (Eds.) (2005). Funds of Knowledge: Theorizing Practices in Households, Communities, and Classrooms. Routledge."}, "tags": ["thicken-6to8-s6", "本土文化", "ear", "行動題"], "language": "zh-Hant-TW"}, {"id": "LOC0000023", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "本土文化", "sub_category": "粿的形狀", "question_type": "沈思題", "action_icon": "star", "question": "紅龜粿做成烏龜的形狀，是希望吃的人長命。如果你能做一塊粿，你會把它做成什麼形狀，那是在祝福什麼呢？", "parent": {"context": "傳統糕點的形狀都藏著心意——龜代表長壽、桃代表祝福。讓孩子知道形狀可以說話之後，邀請他自己想像一個有意思的形狀，把抽象的「祝福」變成具體可以想像的東西。這題只在腦中和對話裡進行，不需要真的去做。", "extensions": ["想想看，你會把這塊粿送給誰，為什麼是他。", "如果形狀代表祝福，那你覺得圓圓的、尖尖的，分別像在說什麼。", "問問家裡的人，他們看過最特別的粿是什麼形狀。"], "dont": ["別把這題變成要孩子真的動手做粿或畫出來。", "別評論孩子想的形狀合不合理、像不像，奇怪的形狀也是好答案。"]}, "source": {"type": "research-derived", "citation": "Herbert P. Ginsburg & Sylvia Opper (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["thicken-6to8-s6", "本土文化", "star", "沈思題"], "language": "zh-Hant-TW"}, {"id": "NAT0000016", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "自然與宇宙", "sub_category": "戶外的聲音", "question_type": "行動題", "action_icon": "ear", "question": "走到外面，閉上眼睛聽一分鐘，數數看你聽到幾種聲音。聽完，挑一種你最想知道是誰發出的，去找找看它從哪裡來。", "parent": {"context": "聲音平常被眼睛蓋過去——閉上眼睛，世界會變得不一樣。對 6-8 歲，這題把「聽」變成一個身體動作:先停下來、再去追一個聲音的來源。重點不是數對幾種,而是孩子願意離開卡片、真的去外面聽,並對某一種聲音生出好奇,自己走過去看。〔執行前提〕需要一個能安全站著的戶外或半戶外角落(陽台、騎樓、公園都行);若當下不方便出門,改成打開一扇窗、把頭探出去聽也可以。", "extensions": ["問他:哪一種聲音你平常從來沒注意過?", "再聽一次,這次猜猜看哪個聲音離你最近、哪個最遠", "換一個時間或換一個地方再聽,聲音有沒有不一樣?"], "dont": ["幫他數好「外面有風聲、車聲、鳥聲」,把答案先講完", "因為他漏聽了某個聲音就說「你怎麼沒聽到」"]}, "source": {"type": "research-derived", "citation": "Worth, K. (2010). Science in Early Childhood Classrooms: Content and Process. Early Childhood Research & Practice (SEED Conference papers)."}, "tags": ["thicken-6to8-s6", "自然與宇宙", "戶外的聲音", "行動題", "聆聽與探索"], "language": "zh-Hant-TW"}, {"id": "NAT0000017", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "自然與宇宙", "sub_category": "看不見的風", "question_type": "沈思題", "action_icon": "star", "question": "風是看不見的,可是你常常知道它來了。想想看,如果你是一陣風,你會最想去把什麼東西吹動?", "parent": {"context": "風是孩子最早遇到的「看不見、卻知道它在」的東西——靠樹葉、頭髮、衣角才知道它來過。對 6-8 歲,這題不要求他解釋風是什麼,而是請他用想像住進風裡,從風的角度去看世界會吹動什麼。重點是孩子願意停下來想像,並可能因此開始留意身邊哪些東西「正在被風吹動」。這是純想像與感受,不需離開卡片、也沒有正確答案。", "extensions": ["問他:當風的時候,你最想輕輕吹、還是用力吹?", "請他閉眼想像自己是風,正在飛過哪裡、碰到了什麼", "下次起風時,陪他看看風這次把什麼吹動了"], "dont": ["糾正他「風其實是空氣在流動」,把想像收掉", "追問「那風從哪裡來」逼他給出科學解釋"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["thicken-6to8-s6", "自然與宇宙", "看不見的風", "沈思題", "想像與擬人"], "language": "zh-Hant-TW"}, {"id": "SOC0000016", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "人與社會", "sub_category": "謝謝與對不起", "question_type": "沈思題", "action_icon": "star", "question": "如果有一天，全世界的人都忘了怎麼說謝謝，街上會變成什麼樣子？慢慢想想看那個畫面。", "parent": {"context": "六到八歲的孩子已經會說謝謝和對不起，但常常是被提醒才說。這張卡用「想像一個沒有謝謝的世界」當入口，讓孩子自己感覺到這兩個詞在人跟人之間是做什麼用的，而不是規矩。星星圖示邀請孩子在腦中蓋一個具體的畫面，這是這個年紀很拿手、卻很少被邀請去做的事。", "extensions": ["畫面裡的人表情是什麼樣子？他們還會不會想幫對方？", "那「對不起」呢？如果也沒有了，吵架之後會發生什麼事？", "你今天說了幾次謝謝？是什麼時候說的，當時對方什麼反應？"], "dont": ["不要把它變成「所以你要記得多說謝謝喔」的提醒，那會讓想像關起來。", "孩子想出怪怪的畫面（例如大家都在生氣）也很好，不用糾正成「正確答案」。"]}, "source": {"type": "research-derived", "citation": "William Damon (1988) The Moral Child: Nurturing Children's Natural Moral Growth, Free Press"}, "tags": ["thicken-6to8-s6", "人與社會", "謝謝與對不起", "沈思題", "star"], "language": "zh-Hant-TW"}, {"id": "SOC0000017", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "人與社會", "sub_category": "鄰居的聲音", "question_type": "沈思題", "action_icon": "ear", "question": "你住的地方附近，有哪些聲音是別人發出來的？閉上眼睛聽一聽，那些聲音背後是誰、在做什麼？", "parent": {"context": "六到八歲的孩子認得鄰居的臉，卻很少想過自己其實天天「聽見」身邊的人在生活。這張卡用聲音當線索，讓孩子發現家門外有一群正在做事的人——掃地、講話、開門、推車。耳朵圖示邀請孩子安靜地聽，再從聲音想回到「那是誰」，把陌生的鄰里變成有人的地方。〔執行前提：太安靜或太吵都沒關係，聽不到也可以改成回想昨天聽過的聲音。〕", "extensions": ["哪個聲音你每天都會聽到？它通常什麼時候出現？", "有沒有一個聲音你一直不知道是誰發出來的？你猜是誰？", "如果這些聲音全部停下來，你會不會覺得怪怪的？"], "dont": ["不要追問「那你要不要去認識他們」，這張卡只是聽和想，不是任務。", "孩子說某個聲音很吵或很煩也沒關係，不用幫鄰居辯解或要他別這樣想。"]}, "source": {"type": "research-derived", "citation": "Robert L. Selman (1980). The Growth of Interpersonal Understanding: Developmental and Clinical Analyses. New York: Academic Press."}, "tags": ["thicken-6to8-s6", "人與社會", "鄰居的聲音", "沈思題", "ear"], "language": "zh-Hant-TW"}, {"id": "MAK0000016", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "動手與感官", "sub_category": "溫度感", "question_type": "行動題", "action_icon": "hand", "question": "在你待的地方走一走，用手輕輕摸摸不同的東西，找出一個摸起來涼涼的、一個摸起來暖暖的。它們為什麼會不一樣呢？", "parent": {"context": "溫度是孩子最早能用身體直接感覺到的物理現象之一。讓孩子親手去摸、去比較，比起聽大人解釋「金屬比較涼」更能在身體裡留下真實的印象，也會自然冒出「為什麼」的疑問。〔執行前提〕請孩子只摸安全的東西，避開爐子、熱水、插電的物品；若一時找不到明顯冷熱的東西，可以引導他摸摸窗邊和被子、地板和桌面。", "extensions": ["問問他：太陽曬過的地方和陰影下的地方，摸起來一樣嗎？", "讓他把手放在自己臉頰上、再放到杯子上，比比看哪個暖。", "聊聊：同一個房間裡，為什麼有的東西涼、有的東西暖？"], "dont": ["別急著告訴他「因為金屬導熱快」這類答案，先讓他自己摸出差別。", "別糾正他說「這個不算冷」，他手上的感覺就是他的答案。"]}, "source": {"type": "research-derived", "citation": "Maria Montessori, The Montessori Method (1912), Chapter XIII — 感官教育與溫度覺(thermic sense)的直接觸摸練習"}, "tags": ["thicken-6to8-s6", "動手與感官", "溫度感", "行動題", "hand"], "language": "zh-Hant-TW"}, {"id": "MAK0000017", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "動手與感官", "sub_category": "聲音的想像", "question_type": "沈思題", "action_icon": "star", "question": "閉上眼睛聽一聽周圍有什麼聲音。如果其中一個聲音會說話，你猜它想跟你說什麼呢？", "parent": {"context": "這張卡先讓孩子安靜下來「聽」，再用想像幫聲音「配上一句話」。對 6-8 歲來說，把抽象的聲音變成一個會說話的角色，既練習了專注聆聽，也打開了想像的空間，而且沒有標準答案。〔執行前提〕找一個不必特別安靜的時刻就好，車聲、風扇聲、鳥叫都可以；如果孩子說「沒有聲音」，可以陪他多等十秒，幾乎一定會冒出什麼。", "extensions": ["問問他：哪個聲音聽起來像在開心，哪個像在生氣？", "讓他想想：同一個聲音，早上和晚上聽，感覺一樣嗎？", "聊聊：如果家裡所有聲音都不見了，會是什麼感覺？"], "dont": ["別說「聲音又不會說話」，這正是要他自由想像的地方。", "別評論他的答案好不好笑，他怎麼想都是對的。"]}, "source": {"type": "research-derived", "citation": "Karen Worth (2010) Science in Early Childhood Classrooms: Content and Process. ECRP (Early Childhood Research & Practice), Vol. 12, No. 2, SEED Conference Papers."}, "tags": ["thicken-6to8-s6", "動手與感官", "聲音的想像", "沈思題", "star"], "language": "zh-Hant-TW"}, {"id": "BOD0000016", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "身體與健康", "sub_category": "換牙的祕密", "question_type": "沈思題", "action_icon": "star", "question": "你的牙齒有沒有搖搖晃晃，或是已經掉了一顆？想想看，如果掉了的牙齒不會再長出新的，吃東西會變成什麼樣子？", "parent": {"context": "六到八歲正是換牙的時候，孩子常為了掉牙又驚又喜。這張卡不解釋牙齒為什麼會掉，而是邀請孩子用想像去玩一個「如果」——把身體當成一件值得好奇的事，而不是急著要一個正確答案。", "extensions": ["如果他願意，可以一起想想：新牙是怎麼知道該往哪裡長的？", "聊聊掉牙時的感覺——是癢癢的、痛痛的，還是有點空空的？", "問問他，動物的牙齒掉了會不會像他一樣再長新的？"], "dont": ["不必告訴他乳牙、恆牙這些名詞，先讓他自己想像。", "別把搖晃的牙齒拿來比較誰換得早、誰換得慢。"]}, "source": {"type": "research-derived", "citation": "Herbert Ginsburg & Sylvia Opper (1988). Piaget's Theory of Intellectual Development, 3rd ed. Prentice-Hall. — 具體運思期兒童透過具體、可感知的身體經驗建構理解"}, "tags": ["thicken-6to8-s6", "身體與健康", "換牙", "想像"], "language": "zh-Hant-TW"}, {"id": "BOD0000017", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "身體與健康", "sub_category": "打哈欠會傳染", "question_type": "行動題", "action_icon": "eye", "question": "下次你打了一個大大的哈欠，看看也聽聽旁邊的人——過一下子，會不會也有人跟著打起哈欠來？", "parent": {"context": "打哈欠常常一個接一個地「傳」出去，這對孩子是個又好玩又神奇的小現象。這張卡請孩子用耳朵去留意身邊的聲音和反應，把日常的小動作變成值得觀察的事。〔執行前提〕需要旁邊有人；如果當下只有他一個人，可以改成下次和家人或同學在一起時再留意。", "extensions": ["問問他，是不是聽到別人打哈欠，自己也會想打？", "一起留意，看書上或電視裡的人打哈欠時，他會不會也跟著打？", "聊聊還有沒有別的事情也會這樣「一個傳一個」？"], "dont": ["別為了試驗故意一直叫他打哈欠，順其自然就好。", "不用急著解釋哈欠為什麼會傳染，讓他自己先發現。"]}, "source": {"type": "research-derived", "citation": "Herbert Ginsburg & Sylvia Opper (1988)《Piaget's Theory of Intellectual Development, 3rd ed.》Prentice-Hall — 具體運思期兒童對真實具體事件做邏輯思考、思維仍依賴直接知覺"}, "tags": ["thicken-6to8-s6", "身體與健康", "打哈欠", "聆聽", "觀察"], "language": "zh-Hant-TW"}, {"id": "MON0000016", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "金錢與選擇", "sub_category": "存錢筒", "question_type": "沈思題", "action_icon": "star", "question": "你有一個小罐子，每天丟一個銅板進去，看不見它什麼時候變滿。想想看，如果你天天都丟，過了很久很久，打開的時候會是什麼樣子？", "parent": {"context": "這題練的是「慢慢累積」的想像——6-8 歲活在此時此地，很難感受「現在看不到、以後才會多起來」這件事。用「看不見何時變滿」當鉤子，讓他在心裡把時間拉長，去想那個慢慢長大的過程，而不是馬上得到。和既有的〔等待〕不同：等待是忍住不吃、馬上多一顆的取捨；這題沒有獎勵、沒有對手，只是純粹想像一點一點累積會變成什麼。", "extensions": ["他想像的「滿」是多少？一罐？滿出來？問問看他怎麼算的", "丟進去的時候看不到變多，他覺得那些銅板在罐子裡做什麼", "如果天天偷偷拿一個出來，最後會變成什麼樣子"], "dont": ["糾正他「一天一個要存好久才會多」這種算術", "趁機說教「你看，存錢就是要有耐心」"]}, "source": {"type": "research-derived", "citation": "Anna E. Berti & Anna S. Bombi (1988) The Child's Construction of Economics, Cambridge University Press — 幼童對「累積/儲蓄」概念的逐步建構"}, "tags": ["thicken-6to8-s6", "金錢與選擇", "存錢筒", "想像"], "language": "zh-Hant-TW"}, {"id": "MON0000017", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "金錢與選擇", "sub_category": "借東西", "question_type": "行動題", "action_icon": "mouth", "question": "找一樣你想用、但不是你的東西，去問借它的人：我可以借嗎？用完什麼時候還給你？把他說的話記在心裡，再告訴我他怎麼說。", "parent": {"context": "〔執行前提〕需要身邊有「東西的主人」在場（家人、同伴都行）；若臨時找不到人，plan B 是回想上一次借別人東西的經過，講給大人聽，一樣可以。這題把「借」這件抽象的事變成一個具體動作：開口問、聽對方怎麼回、約定什麼時候還。重點是讓他親身體會「別人的東西要先問、要約好還」，而不是教條。和既有〔交換〕（9 歲）不同：交換是兩邊都給出東西，借是東西還是別人的、用完要還回去。", "extensions": ["問他：那個人答應的時候，臉上的表情是什麼樣子", "如果借來的東西不小心弄壞了，他想怎麼辦", "有沒有人跟他借過東西？那時候他希望對方怎麼對待"], "dont": ["他忘了約定還的時間就唸他「你看你都沒問清楚」", "替他開口去借，讓他只在旁邊看"]}, "source": {"type": "research-derived", "citation": "Herbert Ginsburg & Sylvia Opper (1988). Piaget's Theory of Intellectual Development (3rd ed.). Prentice-Hall."}, "tags": ["thicken-6to8-s6", "金錢與選擇", "借東西", "互惠"], "language": "zh-Hant-TW"}, {"id": "LOG0000016", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "邏輯與謎題", "sub_category": "找不同", "question_type": "沈思題", "action_icon": "ear", "question": "閉上眼睛，聽聽看冰箱的聲音和電風扇的聲音。它們哪裡不一樣？", "parent": {"context": "找不同通常用眼睛，這張卡換成耳朵。聲音沒有形狀、抓不住，孩子得專心聽、放在心裡比，這對六到八歲是更難也更新鮮的練習。沒有標準答案——粗細、高低、會不會停，都算。", "extensions": ["如果你家沒有冰箱聲或電風扇聲，換成兩種你聽得到的聲音都可以，例如水龍頭和時鐘。", "聽完一輪，問問家人他們聽到的一不一樣。", "哪一個聲音聽久了還在、哪一個會停，也是一種不同。"], "dont": ["先別急著告訴孩子「答案是音調不同」，讓他自己找出他注意到的那一種。", "別要求他閉著眼睛聽很久，覺得無聊或不安就睜開眼，一樣可以聽。"]}, "source": {"type": "research-derived", "citation": "Herbert P. Ginsburg & Sylvia Opper (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["thicken-6to8-s6", "找不同", "聆聽", "6-8歲", "邏輯與謎題"], "language": "zh-Hant-TW"}, {"id": "LOG0000017", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 6, "max": 8}, "category": "邏輯與謎題", "sub_category": "比多少", "question_type": "沈思題", "action_icon": "star", "question": "桌上一堆積木和一堆糖果，不准一個一個數，你會怎麼知道哪一堆比較多？", "parent": {"context": "大人比多少會直接數，但孩子如果想到「兩堆排成一對一對、看哪邊剩下來」，那就摸到了數學裡很重要的一一對應。這張卡不急著要他數，反而把數數擋住，逼他想別的辦法。怎麼想都可以，想不出來也沒關係。", "extensions": ["如果他想到一個辦法，問問看「那如果兩堆東西不一樣大，這招還行嗎」。", "堆得高的那堆，是不是一定比較多？讓他自己想想看。", "換成兩種你家現成的東西（湯匙和叉子、襪子和手帕）再想一次。"], "dont": ["別把「排成一對一對」這個答案先講出來，那是這張卡最想讓他自己撞到的地方。", "別因為他說「就用數的啊」就說他錯，可以再問一次「那不准數呢」。"]}, "source": {"type": "research-derived", "citation": "Herbert P. Ginsburg & Sylvia Opper (1988)《Piaget's Theory of Intellectual Development》(3rd ed., Prentice-Hall) — 一一對應 (one-to-one correspondence) 為兒童數概念與數量比較的基礎運思"}, "tags": ["thicken-6to8-s6", "比多少", "想像", "6-8歲", "邏輯與謎題"], "language": "zh-Hant-TW"}, {"id": "NAT0000018", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "自然與宇宙", "sub_category": "磁鐵吸什麼", "question_type": "行動題", "action_icon": "hand", "question": "拿一塊磁鐵去碰家裡各種東西，找出三樣吸得住的、三樣吸不住的。猜得到下一樣會不會被吸住嗎？", "parent": {"context": "九歲的孩子正從「東西看起來像金屬」進到「親手試了才知道」。磁鐵讓他把猜測和結果擺在一起比對——湯匙吸住、易開罐卻不吸，這種意外正是科學感覺的起點。〔執行前提〕一塊冰箱磁鐵或玩具磁鐵就夠；找不到磁鐵時，改成讓孩子先把家裡的東西分成「我猜會吸／不會吸」兩堆，等有磁鐵那天再驗收。", "extensions": ["把吸住的東西排成一排，問問看它們有什麼共同點", "讓孩子隔著紙、隔著一本書再試，磁力還在不在", "找一樣他本來很確定會吸、結果沒吸的東西，一起想為什麼"], "dont": ["別在他猜之前先講「金屬才會吸」，猜錯也是發現的一部分", "別糾正「不是所有金屬都吸」這種細節，先讓他自己撞上那個意外"]}, "source": {"type": "research-derived", "citation": "Worth, K. (2010). Science in Early Childhood Classrooms: Content and Process. SEED (STEM in Early Education and Development) Conference Papers, published in Early Childhood Research & Practice (Fall 2010). [Conference paper, 非書籍]"}, "tags": ["thicken-9-s7", "自然與宇宙", "磁鐵", "行動題", "動手"], "language": "zh-Hant-TW"}, {"id": "NAT0000019", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "自然與宇宙", "sub_category": "鏡子與反光", "question_type": "行動題", "action_icon": "eye", "question": "拿一面鏡子，試試看能不能用它把陽光或燈光照到天花板上。你動一動鏡子，那塊亮光會往哪邊跑？", "parent": {"context": "九歲開始能注意到「我這樣動，那樣就跟著變」的對應關係。鏡子把看不見的光路變成牆上一塊會跑的亮光，孩子能直接觀察自己的手和光點之間的連動。〔執行前提〕一面小鏡子加一點光源就好；沒有強光時改用手電筒，或在晴天的窗邊試，陰天就改照亮著的燈泡。", "extensions": ["讓他把亮光從地板一路移到天花板，看手要怎麼轉", "兩面鏡子接力，看光能不能轉個彎照到牆角", "問問看為什麼鏡子背對光的時候，牆上就沒有那塊亮光了"], "dont": ["可以提醒他別照到別人的眼睛；除此之外不用多講「入射角、反射角」這些名詞，讓他自己看亮光怎麼跑就好。", "別替他把鏡子擺好，讓他自己摸索角度和亮光的關係"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["thicken-9-s7", "自然與宇宙", "鏡子與反光", "行動題", "觀察"], "language": "zh-Hant-TW"}, {"id": "SOC0000018", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "人與社會", "sub_category": "怎麼變成朋友的", "question_type": "行動題", "action_icon": "mouth", "question": "去問一個你的好朋友：你還記得我們第一次說話是在哪裡、為了什麼嗎？問完，換你也說說你記得的那一次。", "parent": {"context": "九歲的孩子開始能回想友誼是怎麼一步步發生的，而不只覺得「朋友本來就在」。讓他親口去問、再親口去答，他會發現同一段相遇，兩個人記得的細節常常不一樣，這正是友誼有趣的地方。", "extensions": ["如果兩個人記得的版本不一樣，那可能是因為什麼？", "那一次之後，是哪些小事讓你們愈來愈熟？", "有沒有一個人，你很想跟他變成朋友，但還沒開始說話？"], "dont": ["不必追問「那你現在最好的朋友是誰」，把孩子推去排名。", "孩子說不清第一次相遇也沒關係，別替他「糾正」記憶。"]}, "source": {"type": "research-derived", "citation": "Selman, R. L. (1980). The Growth of Interpersonal Understanding: Developmental and Clinical Analyses. New York: Academic Press."}, "tags": ["thicken-9-s7", "人與社會", "9歲", "友誼", "行動題"], "language": "zh-Hant-TW"}, {"id": "SOC0000019", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "人與社會", "sub_category": "一起完成一件事", "question_type": "行動題", "action_icon": "hand", "question": "找一個人，一起把一件需要兩雙手的事做完，例如鋪床、搬桌子或包一份禮物。做完後，說說剛剛誰負責了哪一部分。", "parent": {"context": "九歲的孩子能處理「分工」的具體經驗：誰扶著、誰拉緊、誰負責收尾。透過一件真的需要兩個人的事，他會感覺到合作不是各做各的，而是動作要互相搭配。〔執行前提〕若家裡找不到合適的事，散步時一起折一張紙、抬一個箱子也行。", "extensions": ["哪一個動作，如果只有你一個人就做不到？", "如果再做一次，你們想不想交換負責的部分？", "有沒有一件事，是你覺得三個人一起做會更好玩的？"], "dont": ["別把它變成比賽，看誰做得多做得快。", "孩子若想自己一個人做做看，也讓他試，再聊兩種感覺哪裡不同。"]}, "source": {"type": "research-derived", "citation": "William Damon (1988). The Moral Child: Nurturing Children's Natural Moral Growth. New York: Free Press."}, "tags": ["thicken-9-s7", "人與社會", "9歲", "合作分工", "行動題"], "language": "zh-Hant-TW"}, {"id": "MAK0000018", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "動手與感官", "sub_category": "用工具做小物", "question_type": "行動題", "action_icon": "hand", "question": "用剪刀、膠帶和一張紙，做一個能裝住十顆彈珠或十顆小石頭的小盒子。", "parent": {"context": "9 歲的孩子手已經能穩穩用剪刀和膠帶，但把平的紙變成立體、又要裝得住重量，需要他自己試結構：底要不要折雙層、邊要不要黏高一點。重點不是做得漂亮，是讓他發現「紙怎麼折才不會散、不會破」。沒有彈珠就用小石頭、銅板、豆子都行。", "extensions": ["他做好之後，問他哪裡最容易裂開，那裡能怎麼補強", "換成裝水試試看，紙盒會怎麼樣", "找家裡現成的盒子，看看它的角是怎麼接起來不漏的"], "dont": ["先示範一個「正確做法」給他照著做", "嫌他剪歪了或黏得不整齊"]}, "source": {"type": "research-derived", "citation": "Maria Montessori, The Montessori Method (1912), trans. Anne E. George, New York: Frederick A. Stokes Company. 相關章節：Chapter IX「Muscular Education—Gymnastics」、Chapter XVII（書寫前肌肉機制練習）、Practical Life / 感官教具操作段落。"}, "tags": ["動手與感官", "thicken-9-s7", "工具操作"], "language": "zh-Hant-TW"}, {"id": "MAK0000019", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "動手與感官", "sub_category": "沒有的東西用什麼代替", "question_type": "行動題", "action_icon": "hand", "question": "假裝家裡沒有膠水也沒有膠帶，找出三樣不同的東西，試試看能不能把兩張紙黏在一起。", "parent": {"context": "9 歲的孩子能做簡單的嘗試與比較，這題讓他跳出「黏東西只能用膠水」的習慣，去找替代品：飯粒、口水、髮夾夾住、打濕的紙、糖水都可能。重點是動手試，不是想答案；有的會成功有的會失敗，失敗本身就是發現。〔執行前提〕若怕弄髒桌子，先鋪一張舊報紙或在水槽邊做。", "extensions": ["問他哪一個黏得最牢，他覺得為什麼", "乾了以後再去摸摸看，哪個還黏著、哪個鬆掉了", "下次出門看看，店裡的紙箱是用什麼接起來的"], "dont": ["先告訴他哪些一定行不通", "限制他只能用「乾淨的」東西"]}, "source": {"type": "research-derived", "citation": "Worth, K. (2010). Science in Early Childhood Classrooms: Content and Process. SEED (STEM in Early Education and Development) Conference Papers, Early Childhood Research & Practice (ECRP). https://ecrp.illinois.edu/beyond/seed/worth.html"}, "tags": ["動手與感官", "thicken-9-s7", "替代材料"], "language": "zh-Hant-TW"}, {"id": "BOD0000018", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "身體與健康", "sub_category": "流汗與喝水", "question_type": "行動題", "action_icon": "hand", "question": "等你下次跑跳到滿身是汗，停下來摸摸看不同地方的皮膚，找找看哪裡汗最多。流一身汗以後，你的身體會想要你做什麼？", "parent": {"context": "九歲的孩子能透過親身感受去觀察身體的具體變化，但還不會去推論「為什麼出汗能讓身體涼下來」這種看不見的機制。這題不解釋原理，只邀請孩子在自己的身體上找線索：摸額頭、後頸、背、手心，比較哪裡濕、哪裡乾，再注意流汗之後身體發出的訊號（想喝水、想休息、想吹風）。〔執行前提〕需要一段剛運動完、會出汗的時間；若當下沒辦法動起來，plan B 是回想上次運動完最熱、最渴的那一刻，邊回想邊摸摸現在的皮膚做對照。", "extensions": ["摸摸看流汗的地方，是涼涼的還是熱熱的，跟沒流汗的地方有什麼不一樣", "喝一口水之前先感覺一下口渴，喝完再感覺一次，中間有什麼變化", "想想看天氣很冷的時候運動，跟天氣很熱的時候運動，流汗會不會不一樣"], "dont": ["別急著告訴孩子「流汗是為了散熱」，先讓他自己摸、自己發現", "先不用規定要喝幾杯水，重點是注意身體自己發出的訊號"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["thicken-9-s7", "身體與健康", "9歲", "行動題", "流汗", "喝水"], "language": "zh-Hant-TW"}, {"id": "BOD0000019", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "身體與健康", "sub_category": "牙齒上的東西", "question_type": "行動題", "action_icon": "eye", "question": "早上還沒刷牙的時候，照鏡子靠近看看牙齒表面，再用舌頭舔舔做對照。牙齒上那層看起來、摸起來的東西，你覺得它是從哪裡來的？", "parent": {"context": "九歲的孩子能用舌頭與眼睛這類具體感官去觀察自己身體上的東西，並對「它從哪來」產生好奇，但還不會抽象推理細菌、菌斑這類看不見的概念。這題不給答案，只邀請孩子用舌頭舔、用鏡子看，描述那層東西的感覺與樣子，再自己猜想來源。〔執行前提〕需要一面鏡子和還沒刷牙的時間（例如剛起床）；若不方便照鏡子，plan B 是只用舌頭去感覺、用手指輕摸再聞一聞，一樣能觀察。", "extensions": ["比比看剛起床和剛吃完東西，牙齒摸起來有沒有不一樣", "吃了甜甜的東西以後再舔舔牙齒，感覺有沒有變", "刷完牙以後再用舌頭舔一次，跟刷之前比較有什麼不同"], "dont": ["別急著解釋「那是細菌」或「會蛀牙」，先讓孩子自己描述他摸到、看到的", "不要因為孩子說「噁心」就打住，那份注意正是觀察的開始"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["thicken-9-s7", "身體與健康", "9歲", "行動題", "刷牙", "觀察"], "language": "zh-Hant-TW"}, {"id": "MON0000018", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "金錢與選擇", "sub_category": "找零與算錢", "question_type": "行動題", "action_icon": "hand", "question": "找一樣標了價錢的東西，假裝你拿一張一百元去買，動手算算看店員應該找你多少錢。", "parent": {"context": "九歲的孩子開始能做簡單的加減和比較，但「找零」對他們來說常常還是抽象的——把它變成手邊可以排、可以數的東西，數字就活了起來。這張卡不是要考算術，而是讓孩子親手摸到「付出去」和「拿回來」之間的關係。", "extensions": ["可以拿真的硬幣或紙片代替，讓他排出找回來的錢長什麼樣子", "如果東西超過一百元，看看他怎麼處理「不夠」這件事", "換一個更貴或更便宜的東西再算一次，問他哪裡變了"], "dont": ["別急著糾正他算錯的地方，先看他用什麼方法算", "別把它變成數學考試，算不出來也沒關係"]}, "source": {"type": "research-derived", "citation": "Berti, A. E., & Bombi, A. S. (1988). The Child's Construction of Economics (G. Duveen, Trans.). Cambridge University Press. (Original Italian ed. 1981)"}, "tags": ["金錢與選擇", "找零與算錢", "thicken-9-s7", "行動題", "9歲"], "language": "zh-Hant-TW"}, {"id": "MON0000019", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "金錢與選擇", "sub_category": "舊東西的價值", "question_type": "行動題", "action_icon": "eye", "question": "去找一樣你已經不太玩、不太用的舊東西，仔細看看它，想想看對別人來說它還有沒有用。", "parent": {"context": "九歲的孩子能觀察一樣東西的細節，也開始懂得「對我沒用不代表對別人沒用」。這張卡邀請他用眼睛重新看一件被冷落的舊物，發現價值不是固定的，會隨著人和情況改變。", "extensions": ["可以問他覺得什麼樣的人會想要這個東西，為什麼", "如果東西有點舊或壞了，看看他怎麼判斷還剩多少價值", "讓他比較兩樣舊東西，看看他覺得哪個對別人比較有用"], "dont": ["別直接決定要不要丟掉或送人，先停在「看見價值」這一步", "別評價他留著的東西「沒用」，那是他自己的判斷"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["金錢與選擇", "舊東西的價值", "thicken-9-s7", "行動題", "9歲"], "language": "zh-Hant-TW"}, {"id": "LOG0000018", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "邏輯與謎題", "sub_category": "照線索猜", "question_type": "行動題", "action_icon": "mouth", "question": "你心裡選一個家裡的東西，給家人三個提示，例如它是冷的、它會發光、它有門，看他們猜不猜得到。", "parent": {"context": "九歲的孩子開始能把一個東西拆成幾個特徵來描述，再由別人從特徵倒推回那個東西。出三個提示就是在練習「哪些線索剛剛好，多到能猜出來、又不會一句就破梗」，這是具體的推理對話，不是腦中空想。", "extensions": ["可以反過來，讓家人選東西、給你三個提示，換你猜。", "如果一個提示就被猜中，下次可以挑更容易混淆的東西試試。", "提示可以是形狀、聲音、用途、摸起來的感覺，看看哪一種最好猜。"], "dont": ["不用規定提示一定要照什麼順序講。", "別把沒猜中當成出題出得不好。"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["thicken-9-s7", "邏輯與謎題", "照線索猜", "9歲"], "language": "zh-Hant-TW"}, {"id": "LOG0000019", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 9, "max": 9}, "category": "邏輯與謎題", "sub_category": "對應配對", "question_type": "行動題", "action_icon": "hand", "question": "在家裡找出三把鑰匙或三個蓋子，試試看哪一把開哪個鎖、哪個蓋子蓋哪個瓶子。", "parent": {"context": "九歲的孩子能一個一個試、記住「這個配這個」，把東西兩兩對起來。動手轉鑰匙、蓋蓋子，比在紙上連連看更真實，因為大小、形狀、鬆緊都摸得到，配錯了馬上就知道。", "extensions": ["配對的時候，可以先用眼睛猜哪個配哪個，再動手驗證。", "如果都試過一輪，可以聊聊你是怎麼判斷的，是看大小還是看形狀。", "可以把蓋子和瓶子打亂，請家人也來配配看，比較你們的方法。"], "dont": ["不用要求一次就全部配對成功。", "別替孩子先把答案配好。"]}, "source": {"type": "research-derived", "citation": "Jean Piaget (1952) The Child's Conception of Number, Routledge & Kegan Paul — 一對一對應（one-to-one correspondence）為具體運思期數概念的基礎。"}, "tags": ["thicken-9-s7", "邏輯與謎題", "對應配對", "9歲"], "language": "zh-Hant-TW"}, {"id": "SPI0000024", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "靈性", "sub_category": "東方智慧", "question_type": "行動題", "action_icon": "mouth", "question": "去問三個不同年紀的人：「你覺得怎樣算『夠了』？」聽他們各自停在哪裡。", "parent": {"context": "「夠」沒有固定的數字，每個人喊停的地方都不一樣，這正是東方智慧裡「知足」想邀人看見的。十到十一歲的孩子開始能比較不同人的標準、找出其中的規律與例外，問三個年紀不同的人，能讓「夠了」從一個答案變成一片光譜。〔執行前提〕若身邊一時找不到三個人，問兩個也可以，或把同一個人對食物、玩具、時間三件事分開問。", "extensions": ["可以注意：有沒有人是「越多越好」、有沒有人很快就說「這樣就夠」？", "可以反過來問自己，最近哪一次你心裡冒出「這樣就好了」的感覺。", "可以想想，同一個人對不同東西（零食、睡覺、被稱讚）的「夠」會不會不一樣。"], "dont": ["別急著告訴孩子知足比較好，讓不同的答案先並排在那裡。", "別把某個人的「夠」說成標準答案或拿來比高下。"]}, "source": {"type": "research-derived", "citation": "東方「知足」思想，經典出處見《道德經》第三十三章「知足者富」（老子）；兒童能比較不同人的標準參 Robert L. Selman (1980) The Growth of Interpersonal Understanding, Academic Press。"}, "tags": ["thicken-1011-s8", "東方智慧", "行動題", "知足"], "language": "zh-Hant-TW"}, {"id": "SPI0000025", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "靈性", "sub_category": "內在覺察", "question_type": "沈思題", "action_icon": "star", "question": "念頭好像會自己冒出來又飄走，你能不能只是看著它來、看著它走，不跟著它跑開？", "parent": {"context": "念頭像天空裡的雲，一個接一個來、又散去，而看著雲的那個「你」一直都在。這是內在覺察很核心的一層：分辨「冒出來的念頭」和「正在看的自己」。十到十一歲的孩子已能想「如果我不跟著這個念頭，會怎樣」這種假設，但仍貼著實際感受，所以從「看著一個念頭來去」這種具體經驗切入最自然。", "extensions": ["可以想想，最近有沒有一個念頭你本來想跟著它跑，後來只是看著它就過去了。", "可以比較：跟著念頭跑、和只是看著它，身體的感覺有沒有不一樣。", "可以好奇，念頭安靜下來的時候，那個「在看的你」是什麼樣子。"], "dont": ["別把「看著念頭不跟著走」變成一項要練成的功課或規定。", "別評論孩子說出的念頭好不好、對不對，只陪他一起看著。"]}, "source": {"type": "research-derived", "citation": "David Hay with Rebecca Nye (2006). The Spirit of the Child (Revised Edition). London: Jessica Kingsley Publishers. ISBN 1-84310-371-0. 相關概念：relational consciousness 之 I-self 向度與 awareness sensing（當下覺察），涉及兒童對自身內在經驗的覺察與反思。"}, "tags": ["thicken-1011-s8"], "language": "zh-Hant-TW"}, {"id": "LNG0000024", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "語文", "sub_category": "同一句話不同語氣", "question_type": "行動題", "action_icon": "mouth", "question": "挑一句平常的話，像「你怎麼還在這裡」，用問的、用兇的、用開玩笑的講給家人聽，請他們猜你每次是什麼意思。", "parent": {"context": "十到十一歲的孩子已經能同時抓住「字面相同、語氣不同」這兩個變項，發現意思不是只由字決定，還由說法決定。比九歲多了一層「同一份材料怎麼變出不同意思」的比較，又還貼著真實對話的具體經驗，不必抽象談語用學。我們想邀他親口試，並聽別人怎麼解讀。", "extensions": ["講完問家人：他們是靠哪裡聽出來的，是聲音高低、停頓，還是你的表情。", "換一句更短的，像「好啊」，看看能不能擠出更多種語氣。", "回想最近有沒有一次，別人誤會了你話裡的語氣，那時是什麼情況。"], "dont": ["別先告訴他「哪種語氣才對」，三種都是真的，重點是他自己怎麼變、別人怎麼接。", "別要求他寫成對話劇本交出來，講出來、被誤會、再調整，比寫整齊重要。"]}, "source": {"type": "research-derived", "citation": "Gombert, J.-É. (1992). Metalinguistic Development (T. Pownall, Trans.). Chicago: University of Chicago Press. （含「Metapragmatic Development」專章）"}, "tags": ["thicken-1011-s8", "同一句話不同語氣"], "language": "zh-Hant-TW"}, {"id": "LNG0000025", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "語文", "sub_category": "從偏旁猜字義", "question_type": "沈思題", "action_icon": "star", "question": "找三個有「氵」的字和三個有「木」的字，先別查，光看偏旁猜它們跟什麼有關，再想想為什麼有的字偏旁好像跟意思對不上。", "parent": {"context": "十到十一歲的孩子能從幾個例子裡找規律，也開始注意例外，正好接得住「偏旁透露字義，但不總是準」這種有規則又有破例的觀察。比九歲的單純認偏旁多了「找通則再找反例」的推理，又比十二歲的字源考據更貼近眼前的字，不必追到造字源流。這題是替後面的字源探索鋪路。", "extensions": ["猜完想想：如果讓你替一個新東西造字，你會給它哪個偏旁，為什麼。", "找一個你覺得偏旁「騙了你」的字，想想它原本可能跟什麼有關。", "比比看，同一個偏旁的字，是不是有的明顯、有的很隱晦。"], "dont": ["別急著翻字典對答案，猜錯也是線索，先讓他享受光看偏旁推理的過程。", "別把它變成抄寫部首表的作業，重點是他猜了什麼、為什麼這樣猜。"]}, "source": {"type": "research-derived", "citation": "Gombert, J.-É. (1992). Metalinguistic Development (T. Pownall, Trans.). Chicago: University of Chicago Press."}, "tags": ["thicken-1011-s8", "從偏旁猜字義"], "language": "zh-Hant-TW"}, {"id": "LOC0000024", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "本土文化", "sub_category": "廟裡拜的神明", "question_type": "行動題", "action_icon": "mouth", "question": "找一個記得的人問問，你家附近那間廟主要拜的是哪一位神明，為什麼是這一位、不是別的。", "parent": {"context": "每間廟拜的神明常常和這個地方的過去有關——靠海的地方多半拜媽祖，開墾的地方可能拜土地公或開漳聖王。問「為什麼是這一位」，比問「拜的是誰」多了一層找原因。〔執行前提〕如果附近沒有廟，或一時找不到人問，可以改問家裡長輩他們小時候住的地方拜什麼、為什麼。", "extensions": ["問到的人說得出原因，還是只記得「一直都拜這位」——這兩種答案差在哪裡", "如果這個地方以前是別種樣子（靠海變內陸、農田變城市），拜的神明會不會也跟著換", "同一條街上有沒有第二間廟拜不同的神，那又是為什麼"], "dont": ["別急著上網查這位神明的標準介紹——先聽人講的版本", "別把問到的答案分成對的錯的，不同人記得的不一樣很正常"]}, "source": {"type": "research-derived", "citation": "González, N., Moll, L. C., & Amanti, C. (Eds.). (2005). Funds of Knowledge: Theorizing Practices in Households, Communities, and Classrooms. Mahwah, NJ: Lawrence Erlbaum Associates (Routledge)."}, "tags": ["thicken-1011-s8", "本土文化", "10-11歲", "行動題", "廟", "神明", "在地由來"], "language": "zh-Hant-TW"}, {"id": "LOC0000025", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "本土文化", "sub_category": "靠山還是靠海", "question_type": "沈思題", "action_icon": "star", "question": "你住的地方比較靠山還是靠海（如果都不太算，就挑一個你比較常去的）？如果搬到另一邊去，吃的、玩的、做的工作可能會有哪些不一樣？", "parent": {"context": "靠山和靠海是兩種很不同的生活——海邊的人捕魚曬鹽、看潮汐；山裡的人種茶採筍、看天氣。讓你同時想兩個地方再比較，是練習一次抓住兩三件會跟著改變的事，而不只是說「不一樣」。", "extensions": ["想想看，哪些事情換了地方就一定會變，哪些不管靠山靠海都差不多", "如果一個地方既靠山又靠海，生活會比較豐富還是比較難選擇", "你現在住的地方，有沒有哪些習慣其實是被山或海『留下來』的"], "dont
