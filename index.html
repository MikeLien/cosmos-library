": ["別只說一邊比較好，兩邊各有各的樣子", "別覺得一定要答得很完整，想到兩三個差別就夠你琢磨了"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["thicken-1011-s8", "本土文化", "10-11歲", "沈思題", "山與海", "比較", "在地生活"], "language": "zh-Hant-TW"}, {"id": "NAT0000020", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "自然與宇宙", "sub_category": "誰吃誰：把生物排成一條線", "question_type": "行動題", "action_icon": "hand", "question": "找三四種你知道的生物，試著用線或紙條把牠們排成「誰吃誰」的順序。如果中間少了一種，這條線會發生什麼事？", "parent": {"context": "十到十一歲的孩子開始能把好幾樣東西排出先後與因果，不再只看單一一隻動物在做什麼。把生物排成一條「吃與被吃」的鏈，是在練習看見彼此相連、而不是各自獨立。這比九歲只問「為什麼某隻動物這樣做」多了一層關係的串接，又還沒到十二歲談整個生態網那麼抽象，剛好停在看得見、排得出來的具體階段。", "extensions": ["問問如果最底下那種被吃光了，最上面那種會不會也受影響", "看看同一種生物會不會出現在兩條不同的線上", "找一種你排不進去的生物，想想牠到底吃什麼、被誰吃"], "dont": ["別急著告訴孩子哪條排法才對，排錯也是一種發現", "別要求一定要排到很長，三四種看出關係就夠了"]}, "source": {"type": "research-derived", "citation": "Worth, K. (2010). Science in Early Childhood Classrooms: Content and Process. SEED (STEM in Early Education and Development) Conference Papers, Early Childhood Research & Practice. https://ecrp.illinois.edu/beyond/seed/worth.html"}, "tags": ["自然與宇宙", "10-11歲", "食物鏈", "thicken-1011-s8", "行動題"], "language": "zh-Hant-TW"}, {"id": "NAT0000021", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "自然與宇宙", "sub_category": "水跑到哪裡去了", "question_type": "沈思題", "action_icon": "star", "question": "下過雨之後，地上的水後來都跑到哪裡去了？如果這些水會循著一條路一直走，你猜那條路會經過哪些地方？", "parent": {"context": "十到十一歲的孩子能在腦中追著一樣東西想像它的去向，並串起好幾個步驟猜出可能的路線。問雨後的水去哪，是邀請孩子想像一個看不見、卻一直在轉的循環。這比九歲看雲、看天氣眼前的樣子多了「水會變、會跑、再回來」的推想，又還沒到十二歲談蒸發機制那種抽象命題，停在孩子能用想像走一遍的程度。", "extensions": ["想想曬在外面的濕衣服變乾時，那些水又去了哪裡", "猜猜河裡的水最後會流到哪、會不會有一天又變成雨", "想想同一滴水會不會其實已經來來回回好多次了"], "dont": ["別急著給出「蒸發、凝結、降雨」的標準名詞，先讓孩子用自己的話描述", "別否定孩子天馬行空的路線，那正是他在想像看不見的循環"]}, "source": {"type": "research-derived", "citation": "Herbert Ginsburg & Sylvia Opper (1988) Piaget's Theory of Intellectual Development, 3rd ed., Prentice-Hall — 具體運思期兒童能在心中表徵看不見的轉變與循環歷程。"}, "tags": ["自然與宇宙", "10-11歲", "水循環", "thicken-1011-s8", "沈思題"], "language": "zh-Hant-TW"}, {"id": "SOC0000020", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "人與社會", "sub_category": "答應了卻做不到", "question_type": "沈思題", "action_icon": "heart", "question": "你答應了一件事，後來卻做不到。比起一開始就說不行，這樣別人對你的感覺差在哪裡？換成是別人這樣對你呢？", "parent": {"context": "十到十一歲的孩子開始懂得，承諾不只是當下的一句話，還牽動別人後來的期待與依賴。讓他比較「沒答應」和「答應後失約」兩種情況對信任的不同影響，能練習從對方的位置看自己的言行。", "extensions": ["如果做不到的時候提早講，會不會不一樣？", "想想一個你說到做到的人，你為什麼比較願意相信他？", "有沒有哪種承諾，本來就不該隨便答應？"], "dont": ["不用追問他是不是有過失約的經驗、逼他認錯。", "別把它導向「以後要做個守信用的人」的結論。"]}, "source": {"type": "research-derived", "citation": "William Damon (1988). The Moral Child: Nurturing Children's Natural Moral Growth. New York: Free Press."}, "tags": ["thicken-1011-s8", "人與社會", "10-11歲", "承諾", "信任", "沈思題"], "language": "zh-Hant-TW"}, {"id": "SOC0000021", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "人與社會", "sub_category": "一群人裡誰帶頭", "question_type": "行動題", "action_icon": "eye", "question": "找一群正在一起做事的人，看看是誰在帶頭，是大家推的、自己跳出來的、還是本來就講好的。再看看其他人是聽他的、躲著他、還是另外有人偷偷在帶。", "parent": {"context": "十到十一歲的孩子能同時觀察好幾個人之間的關係，也開始發現「帶頭的人」不一定只有一個、產生方式也不只一種。讓他到真實場合（球場、社團、市場、家族聚餐）去看，而不是憑印象想，能練習比較不同群體的帶頭方式。〔執行前提〕找不到正在運作的群體時，可改回想最近看過的一次，例如分組打掃或家人一起煮飯。", "extensions": ["換一個地方再看一次，帶頭的方式有沒有不一樣？", "帶頭的人換掉，這群人做事會變怎樣？", "有沒有人沒有頭銜，卻其實大家都在聽他的？"], "dont": ["不用評斷哪種帶頭方式比較好或比較對。", "別要他去問人家「你們誰是老大」，先用看的就好。"]}, "source": {"type": "research-derived", "citation": "Selman, R. L. (1980). The Growth of Interpersonal Understanding: Developmental and Clinical Analyses. New York: Academic Press."}, "tags": ["thicken-1011-s8", "人與社會", "10-11歲", "群體", "帶頭", "觀察", "行動題"], "language": "zh-Hant-TW"}, {"id": "MAK0000020", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "動手與感官", "sub_category": "讓東西動起來", "question_type": "行動題", "action_icon": "hand", "question": "找一樣東西，想三種讓它動起來的方法，做做看哪種讓它跑得更遠。", "parent": {"context": "十到十一歲的孩子開始能同時想兩三個條件——坡度、輪子、推力。這張卡邀請他用「動手做」去比較，而不是用想的猜答案；過程裡的失敗和意外，往往比成功更有意思。〔執行前提〕用手邊現成的東西就好（罐子、玩具車、橡皮筋、書本疊成的斜坡都行）；若一時找不到會滾的，改成「讓紙團移動」一樣成立。", "extensions": ["同一個坡度，換不同重量的東西，跑得一樣遠嗎", "把兩種方法合在一起（例如坡道加推力），會更遠還是反而卡住", "如果想讓它停在指定的地方，而不是跑最遠，你會怎麼改"], "dont": ["別替他決定哪種方法「對」，跑不遠也是一種發現", "別在他還在試的時候就解釋原理，讓他先自己摸出規律"]}, "source": {"type": "research-derived", "citation": "Worth, K. (2010). Science in Early Childhood Classrooms: Content and Process. SEED (STEM in Early Education and Development) Conference Papers, Early Childhood Research & Practice. https://ecrp.illinois.edu/beyond/seed/worth.html"}, "tags": ["thicken-1011-s8", "動手與感官", "10-11歲", "行動題", "讓東西動起來"], "language": "zh-Hant-TW"}, {"id": "MAK0000021", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "動手與感官", "sub_category": "整理與分類的辦法", "question_type": "沈思題", "action_icon": "star", "question": "面對一堆很雜的東西，你會用什麼當分類的規則，換一個規則又會變成怎樣。", "parent": {"context": "整理不只是「擺整齊」，背後是一套看不見的分類邏輯——按顏色、按大小、按常不常用，每種規則都會排出不一樣的世界。十到十一歲的孩子能想像不只一種分法，並比較哪種更好找，這正是抽象思考的萌芽。這張卡只是邀請他想，不需要真的去整理。", "extensions": ["同一堆東西，哪些不管用什麼規則都會落在一起", "如果是別人來找，他想要的分類方式會不會和你不一樣", "有沒有一種東西，怎麼分都很難歸進任何一類"], "dont": ["別把它變成「快去整理房間」的任務，這張是用想的", "別說哪種分類法才正確，越多種想法越好"]}, "source": {"type": "research-derived", "citation": "Montessori, M. (1912). The Montessori Method (A. E. George, Trans.). New York: Frederick A. Stokes Company. (Original Italian work published 1909)"}, "tags": ["thicken-1011-s8", "動手與感官", "10-11歲", "沈思題", "整理與分類的辦法"], "language": "zh-Hant-TW"}, {"id": "BOD0000020", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "身體與健康", "sub_category": "緊張時身體先說話", "question_type": "沈思題", "action_icon": "star", "question": "有些時候你還沒開口，身體就先有反應了——肚子緊緊的、手心冒汗、心跳變快。如果這些反應是身體想替你說的話，它在不同的時刻會想說些什麼？", "parent": {"context": "10-11 歲的孩子開始能同時看好幾種情況、找出裡面重複的規律，也注意到例外。這張卡不問「為什麼會緊張」這種單一答案，而是邀請孩子把不同場合的身體反應放在一起比較，想像身體像是有自己的語言。這是通往 12 歲身心連結的橋，但仍貼著孩子真的感覺得到的具體經驗，不變成抽象命題。", "extensions": ["可以聊聊：同一種反應（例如手心冒汗），在不同場合會不會代表不一樣的事？", "想想看身體有沒有哪一次反應得很快、後來卻發現沒事，那次它在保護你什麼？", "如果身體會用反應提醒你，你願不願意也回它一句話、或慢慢呼吸讓它知道你收到了？"], "dont": ["別急著告訴孩子「那是因為焦慮」這類標準解釋，先讓他自己描述身體的感覺。", "別把身體反應講成壞事或需要立刻消除的問題，它常常只是在傳訊息。"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["thicken-1011-s8", "身體與健康", "10-11歲", "沈思題", "身心連結", "情緒覺察"], "language": "zh-Hant-TW"}, {"id": "BOD0000021", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "身體與健康", "sub_category": "習慣怎麼變成自動", "question_type": "行動題", "action_icon": "hand", "question": "找一件你已經不用想就會做的事——洗手、刷牙、進門脫鞋——刻意放慢一遍，把每個小步驟做出來、記下來。再去問家裡或學校的某個人，他做同一件事的順序和你一不一樣。", "parent": {"context": "10-11 歲能處理兩三個變項、找規律也找例外。這張卡讓孩子把一個早已自動化的習慣拆開、放慢，再去比對別人的版本，發現「同一件事原來有不只一種做法」。比 9 歲多了動手拆解加跨人比較，又不需要 12 歲那種對社會規則的抽象思辨。〔執行前提〕需要找到一個人聊一聊；若家人忙或不在，plan B 是改問同學、或先把自己和昨天的做法比一比。", "extensions": ["比對之後可以聊：哪些步驟兩個人都有、哪些只有其中一個人做？", "想想看這件事是什麼時候、被誰教會的，還是自己慢慢變成這樣的？", "試試看故意換一個順序做做看，會比較順還是比較卡？"], "dont": ["別把目標變成「糾正誰做得對」，這裡沒有標準做法，只是去看不同。", "別只用嘴巴問就算了，先自己放慢做一遍再去比，差別才看得出來。"]}, "source": {"type": "research-derived", "citation": "Charles Duhigg (2012) The Power of Habit, Random House — 習慣如何透過反覆變成自動的程序（習慣迴路 cue–routine–reward）。"}, "tags": ["thicken-1011-s8", "身體與健康", "10-11歲", "行動題", "日常習慣", "自我照顧"], "language": "zh-Hant-TW"}, {"id": "MON0000020", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "金錢與選擇", "sub_category": "用一筆錢配出一個計畫", "question_type": "行動題", "action_icon": "hand", "question": "找一筆固定的錢，想想用它同時買到三樣你在意的東西，要怎麼配。把你排出來的組合寫下來或擺出來給自己看。", "parent": {"context": "把一筆錢分給好幾樣東西，得同時顧到價錢、想要的程度、還剩多少這幾件事。讓孩子真的動手排一次，比起只在腦中想，更能看見取捨怎麼發生。〔執行前提〕不一定要真的有錢，可以用想像的金額；手邊沒紙筆時，用口頭排或把東西排成一列也算數。", "extensions": ["如果其中一樣特別貴，你會放掉它，還是別樣少買一點來湊？", "排好之後再看一次，有沒有哪樣其實沒那麼需要、可以換成別的？", "同樣這筆錢，換一個人來配可能會排得很不一樣，你猜他會怎麼排？"], "dont": ["別急著評論孩子的組合聰不聰明、值不值得。", "別替他把錢算好，讓他自己撞到「不夠」再想辦法。"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["thicken-1011-s8", "金錢與選擇", "規劃", "行動題"], "language": "zh-Hant-TW"}, {"id": "MON0000021", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "金錢與選擇", "sub_category": "怎麼判斷划不划算", "question_type": "沈思題", "action_icon": "star", "question": "同樣的錢可以買 A，也可以買 B，你會說哪一個比較划算？是看價錢、看能用多久、還是看你有多喜歡——想想你心裡是用什麼在比。", "parent": {"context": "「划算」不是只看價錢高低，還可能藏著用多久、多喜歡、能不能分給別人這些看不見的尺。讓孩子去摸自己心裡那把尺，比直接告訴他答案更有意思。", "extensions": ["如果 A 比較便宜但很快就玩膩，B 比較貴卻能用很久，這時候哪個划算？", "對你划算的東西，對你朋友可能一點都不划算，差別在哪裡？", "有沒有一種東西，是再便宜你都覺得不划算的？"], "dont": ["別告訴孩子「當然是便宜的划算」這種標準答案。", "別把話題拉去比較他和別人花錢的習慣誰比較好。"]}, "source": {"type": "research-derived", "citation": "Berti, A. E., & Bombi, A. S. (1988). The Child's Construction of Economics (G. Duveen, Trans.). Cambridge University Press. (European Monographs in Social Psychology; original Italian edition 1981)"}, "tags": ["thicken-1011-s8", "金錢與選擇", "比較", "沈思題"], "language": "zh-Hant-TW"}, {"id": "LOG0000020", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "邏輯與謎題", "sub_category": "多線索推理", "question_type": "行動題", "action_icon": "mouth", "question": "找三個人各給你一條關於同一件事的線索，把三條湊起來，看看能不能縮到只剩一個答案。", "parent": {"context": "十到十一歲開始能同時握住兩三條訊息互相對照，靠交集排除而不只是單看一條猜。這張卡邀請你體驗「一條不夠、湊起來才夠」的推理，也順便看看線索之間會不會打架。〔執行前提〕若一時找不到三個人，可改成從一張時刻表、菜單或說明書上找三條線索；湊不出唯一答案也很好，那本身就值得想。", "extensions": ["如果三條線索指向不只一個答案，是哪一條太鬆了？", "把其中一條拿掉，剩兩條還夠縮到一個嗎？", "有沒有兩條線索互相矛盾，那要相信哪一條？"], "dont": ["別只收集一條線索就急著宣布答案", "別把湊不出唯一答案當成失敗"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["thicken-1011-s8", "logic", "多線索推理", "10-11"], "language": "zh-Hant-TW"}, {"id": "LOG0000021", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 10, "max": 11}, "category": "邏輯與謎題", "sub_category": "條件推理", "question_type": "沈思題", "action_icon": "star", "question": "想一條「如果下雨，我們就待在家」這樣的規則，再想想看：那如果沒下雨呢，規則有沒有說一定會出門？", "parent": {"context": "十到十一歲開始能玩「如果……就……」的假設，也漸漸發現「條件成立會怎樣」和「條件不成立會怎樣」是兩件不同的事。這張卡邀請你想：規則只規定了一半，另一半其實是空白的，可以填很多種。", "extensions": ["同一條規則，下雨一定待在家，但待在家一定是因為下雨嗎？", "生活裡還有哪些規則，其實沒規定「相反的情況」？", "如果把規則反過來說，意思會不會就變了？"], "dont": ["別預設「沒下雨」就一定等於「出門」", "別急著找出一條唯一正確的規則"]}, "source": {"type": "research-derived", "citation": "Inhelder, B., & Piaget, J. (1958). The Growth of Logical Thinking from Childhood to Adolescence: An Essay on the Construction of Formal Operational Structures (A. Parsons & S. Milgram, Trans.). New York: Basic Books."}, "tags": ["thicken-1011-s8", "logic", "條件推理", "10-11"], "language": "zh-Hant-TW"}, {"id": "NAT0000022", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "自然與宇宙", "sub_category": "能量轉換的去向", "question_type": "沈思題", "action_icon": "star", "question": "你早上吃下的東西，後來變成了跑跳的力氣、體溫，還是別的什麼？同一份食物的能量，會不會同時跑去好幾個地方？", "parent": {"context": "十二歲的孩子開始能想像看不見的東西在不同形式之間轉換，而不只是停在「吃飽就有力氣」這層直覺。這題不要他背能量守恆，而是讓他試著追一份食物的能量去了哪裡，並容許它分岔到多個方向。沒有標準比例，重點是他願不願意把一件熟悉的事拆成好幾條看不見的線。", "extensions": ["如果今天幾乎沒動，那些沒變成力氣的能量，你猜它跑去哪了。", "天氣很冷的時候，這份食物的能量會不會分配得不一樣。", "睡覺的時候身體沒在跑跳，可是還是會餓，那能量在做什麼。"], "dont": ["別急著給他「能量守恆定律」這個詞，先讓他自己追線索，名詞晚點再說也不遲。", "別把他的猜測判成對或錯，就算他說能量「消失了」，那也是值得繼續追下去的起點。"]}, "source": {"type": "research-derived", "citation": "Bärbel Inhelder & Jean Piaget (1958) The Growth of Logical Thinking from Childhood to Adolescence, Basic Books — 形式運思初萌者能同時持有並推理多重變項與因果關係。"}, "tags": ["thicken-12-s9", "自然與宇宙", "能量轉換", "沈思題"], "language": "zh-Hant-TW"}, {"id": "NAT0000023", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "自然與宇宙", "sub_category": "構造對應環境的推理", "question_type": "行動題", "action_icon": "eye", "question": "挑一隻你常看到的動物，仔細看牠身上某個特別的地方，再想想牠住在哪、怎麼過活。找出那個構造可能是為了應付什麼而長成這樣。", "parent": {"context": "〔執行前提〕需要一隻能近距離觀察的動物。家裡有寵物、窗邊有麻雀或螞蟻都可以；都沒有的話，plan B 是看一張你拍過或印象很深的動物照片，憑記憶仔細回想那個部位。十二歲的孩子能把「身體某處」和「生活環境」連起來做推理，而不只是描述外觀。這題讓他練習從一個構造反推它要解決的問題，答案常常不只一種。", "extensions": ["同一個部位，換到完全不同的環境，會不會就變成累贅。", "你看到的這個特徵，有沒有可能根本不是為了你猜的那個用途。", "另一隻住在很不一樣地方的動物，牠的同一個部位長得像嗎。"], "dont": ["別替他翻書找「正確答案」，他自己推出來的理由就算後來發現不對，過程也比結論值錢。", "別要求他講得像課本一樣完整，看到一個部位、想出一條理由就已經夠了。"]}, "source": {"type": "research-derived", "citation": "Worth, K. (2010). Science in Early Childhood Classrooms: Content and Process. SEED (STEM in Early Education and Development) Conference Papers, Early Childhood Research & Practice, 12(2). — 從近距離觀察具體現象走向因果／功能推測的科學探究歷程（以蝸牛黏液與移動為例）"}, "tags": ["thicken-12-s9", "自然與宇宙", "動物構造", "行動題"], "language": "zh-Hant-TW"}, {"id": "SOC0000022", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "人與社會", "sub_category": "同一個人的不同角色", "question_type": "沈思題", "action_icon": "star", "question": "在家裡、在學校、在你最自在的那群人裡，你說話的方式會不會不一樣？哪一個才是真正的你，還是它們都是？", "parent": {"context": "十二歲開始能跳出單一場景，發現自己在不同人面前像換了一個樣子。這題不要他選出「真我」，而是讓他想像：同一個人為什麼會有好幾種樣子，這些樣子之間有沒有矛盾、又怎麼共存。", "extensions": ["想一個你在某個地方絕不會做、在另一個地方卻很自然的事，那個差別是因為人不同，還是規則不同？", "回想有沒有過兩種角色撞在一起的時刻，比如同學突然出現在家庭聚會，那時你想怎麼站？", "如果其中一個樣子完全消失了，你會少掉什麼？"], "dont": ["別急著替他下「這樣很假」或「要做自己」的結論，多種樣子本身不是問題。", "別把它變成檢討他在某個場合的表現，這題是想，不是評分。"]}, "source": {"type": "research-derived", "citation": "Robert L. Selman (1980). The Growth of Interpersonal Understanding: Developmental and Clinical Analyses. New York: Academic Press. —— 角色取替（role-taking / social perspective-taking）與自我在不同關係中的協調"}, "tags": ["thicken-12-s9", "人與社會", "角色", "自我"], "language": "zh-Hant-TW"}, {"id": "SOC0000023", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "人與社會", "sub_category": "歷史中的選擇", "question_type": "行動題", "action_icon": "mouth", "question": "找一位比你大很多的人，問他小時候有沒有一條現在看來很奇怪、但當時大家都照做的規矩，再問他那時的人為什麼覺得那樣是對的。", "parent": {"context": "十二歲能開始把「以前的決定」放回它的時空裡看，而不只是用現在的眼光評斷對錯。這題帶他去問一個真實的人，聽見一個選擇背後的處境與理由，發現過去的人不是笨，而是站在不同的條件上。〔執行前提〕若身邊一時找不到年長的人，改問爸媽轉述長輩的故事，或問任何記得「以前不一樣」的人都可以。", "extensions": ["聽完之後，想想那條舊規矩當時是在解決什麼問題，那個問題現在還在嗎？", "問問對方：是什麼讓大家後來覺得可以不一樣了？", "換你想一條現在大家都覺得理所當然的事，會不會有一天也被覺得奇怪？"], "dont": ["別在對方說的時候急著說「這也太誇張了」，先讓他把當時的處境說完。", "別把答案導向「以前的人比較落後」，重點是理解選擇，不是排名。"]}, "source": {"type": "research-derived", "citation": "Kohlberg, L. (1981). The Philosophy of Moral Development: Moral Stages and the Idea of Justice (Essays on Moral Development, Vol. 1). San Francisco: Harper & Row."}, "tags": ["thicken-12-s9", "人與社會", "歷史", "選擇"], "language": "zh-Hant-TW"}, {"id": "MAK0000022", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "動手與感官", "sub_category": "省力的祕密", "question_type": "行動題", "action_icon": "hand", "question": "找一樣需要用力的東西，像開瓶器、剪刀或門把，試著改變你出力的位置，看看哪裡最省力。換個地方推或拉，感覺有什麼不一樣。", "parent": {"context": "十二歲的孩子開始能在腦中追問「為什麼這樣比較省力」，而不只是接受結果。槓桿、把手、轉軸這些日常裝置背後都藏著力學原理，但要真正懂，得讓手去試出差別，再讓推理跟上身體的感覺。這張卡邀請孩子把抽象的省力概念，連回手指上的真實感受。", "extensions": ["如果讓孩子比較同一個動作在不同位置出力的差別，他可能會自己摸索出「離轉軸越遠越省力」這類規律。", "可以一起找家裡其他有把手、有轉軸的東西，猜猜看哪些用了一樣的省力方式。", "孩子若問「那是不是越長越好」，那正是一個值得他自己再試一次去回答的問題。"], "dont": ["別先講出槓桿原理或公式，那會讓他停止用手去感覺差別。", "別糾正他用的詞不夠精準，他能描述出「這裡比較輕」就已經抓到重點了。"]}, "source": {"type": "research-derived", "citation": "Worth, K. (2010). Science in Early Childhood Classrooms: Content and Process. SEED (STEM in Early Education and Development) Conference Papers, Early Childhood Research & Practice. https://ecrp.illinois.edu/beyond/seed/worth.html"}, "tags": ["動手與感官", "簡單機械", "省力", "thicken-12-s9", "行動題"], "language": "zh-Hant-TW"}, {"id": "MAK0000023", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "動手與感官", "sub_category": "兩個人做同一件事", "question_type": "沈思題", "action_icon": "star", "question": "想像兩個人要把同一個東西做出來，比方說摺一隻紙船，他們的步驟卻不太一樣。你覺得是什麼讓他們走上不同的做法？", "parent": {"context": "十二歲的孩子能同時在腦中握住好幾個變因——習慣、手邊的工具、想達到的樣子——並推想它們怎麼造成不同結果。這張卡不要他選出誰對誰錯，而是讓他理解：同一個目標可以有很多條合理的路，差別來自做的人帶著什麼。這是從「有標準答案」走向「有多種好答案」的思考練習。", "extensions": ["他可能會想到自己和別人做某件事的方式不同，那段回憶會讓抽象的問題變得具體。", "如果他提到「因為他們想要的不一樣」，可以順著問還有什麼也會造成差別。", "孩子若開始分辨「哪種做法在什麼情況比較好」，他已經摸到取捨的邊緣了。"], "dont": ["別暗示其中一種做法才是正確的，那會關掉他看見多種可能的眼睛。", "別把它變成要他立刻去摺一隻來比，這張卡是用想的，不是用做的。"]}, "source": {"type": "research-derived", "citation": "Donald A. Norman (2013). The Design of Everyday Things: Revised and Expanded Edition. Basic Books. ——「心智模型」核心概念：人各自建立對系統/任務的概念模型，不同人形成不同模型，操作行為隨之而異。"}, "tags": ["動手與感官", "做法差異", "心智模型", "thicken-12-s9", "沈思題"], "language": "zh-Hant-TW"}, {"id": "BOD0000022", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "身體與健康", "sub_category": "記憶如何運作", "question_type": "沈思題", "action_icon": "star", "question": "你背過卻又忘掉的事，現在跑去哪裡了？它是整個消失，還是只是你一時找不到通往它的路？", "parent": {"context": "十二歲的孩子開始能把「記得」當成一件可以追問的事，而不只是有或沒有。這題邀請他想像記憶像一座有路徑的圖書館，忘記也許不是書不見了，而是路斷了。不需要正解，只想讓他對自己的腦袋升起好奇。", "extensions": ["如果忘掉的東西沒消失，什麼時候它會突然又自己冒出來？", "為什麼有些事你完全不想記卻記得超清楚？", "睡一覺之後再想，跟剛背完馬上想，會不會不一樣？"], "dont": ["別把它變成檢查他功課背熟沒。", "別急著告訴他大腦海馬迴怎麼運作的科學答案。"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["thicken-12-s9", "身體與健康", "記憶", "沈思題"], "language": "zh-Hant-TW"}, {"id": "BOD0000023", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "身體與健康", "sub_category": "感官的極限", "question_type": "行動題", "action_icon": "hand", "question": "此刻你身邊一定有你聽不到、看不到的東西正在發生；動手找一個方法，讓其中一樣變成你感覺得到的。", "parent": {"context": "十二歲開始能想：我的感官只接收了世界的一小段。這題讓他親手把某種「感覺不到的」變得感覺得到，例如把手機鈴聲調到震動感受看不見的聲波，或用水盆看見聽不見的低頻晃動。〔執行前提〕若手邊沒有現成工具，plan B 是閉眼遮耳一分鐘後，數數還有哪些感覺仍在運作。", "extensions": ["你的方法是放大了哪一種感官，還是換了一種感官去接收？", "如果有種動物能感覺到你完全感覺不到的東西，世界對牠長什麼樣子？", "感覺不到，跟不存在，是同一件事嗎？"], "dont": ["別替他準備好器材，找方法本身就是這題的重點。", "別評論他的方法夠不夠科學或對不對。"]}, "source": {"type": "research-derived", "citation": "Ginsburg, H. P., & Opper, S. (1988). Piaget's Theory of Intellectual Development: An Introduction (3rd ed.). Englewood Cliffs, NJ: Prentice-Hall."}, "tags": ["thicken-12-s9", "身體與健康", "感官", "行動題"], "language": "zh-Hant-TW"}, {"id": "MON0000022", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "金錢與選擇", "sub_category": "價格是誰決定的", "question_type": "沈思題", "action_icon": "star", "question": "同樣一個東西，這家店賣得貴、那家店賣得便宜，價格到底是誰決定的呢。你想想看，有哪些藏在背後的原因，可能讓同一樣東西標上不一樣的數字。", "parent": {"context": "十二歲的孩子開始能同時考慮好幾個原因交織在一起，而不只看單一因素。價格差異是日常就能碰到、卻很少被追問的現象——它把「東西本身」和「賣的人、地點、時機、成本」拆開來，邀請孩子推想那些看不見的變項。這題不要他算出誰對誰錯，而是讓他練習為一個現象列出多種可能的解釋。", "extensions": ["如果同一樣東西兩家差很多，你會想知道貴的那家多花了什麼，還是便宜的那家少了什麼", "換一個東西想想看——飲料、衣服、玩具，價格決定的原因會不會不一樣", "有沒有一種東西，不管在哪裡賣價格都差不多，為什麼它比較難變"], "dont": ["先別急著下結論說貴的就是被坑、便宜的就是賺到，原因可能比這複雜", "不必馬上查網路比價，先讓自己的猜測多冒出幾個再說"]}, "source": {"type": "research-derived", "citation": "Berti, A. E., & Bombi, A. S. (1988). The Child's Construction of Economics (G. Duveen, Trans.). Cambridge University Press / Editions de la Maison des Sciences de l'Homme. (Original Italian edition 1981.)"}, "tags": ["thicken-12-s9", "金錢與選擇", "價格", "跨變項"], "language": "zh-Hant-TW"}, {"id": "MON0000023", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "金錢與選擇", "sub_category": "借與還", "question_type": "行動題", "action_icon": "mouth", "question": "找一個曾經跟別人借過東西或借過錢的大人，問問他借的時候和還的時候，除了把東西還回去，還有沒有別的需要還的。把他說的記在心裡。", "parent": {"context": "〔執行前提〕需要有一位願意聊的大人；若一時找不到，plan B 是問家裡任何一個曾經借還過東西的人，連借鉛筆、借書都算。十二歲的孩子已能想像「借」不只是拿走再放回，而牽涉信任、人情、有時還多了一點什麼——這正是利息最素樸的雛形。讓他從真人經驗去聽，而不是從定義學起。", "extensions": ["他說的「多還的」是錢，還是謝意、是更小心、還是別的", "借的時候兩個人心裡在意的事，一樣嗎", "如果借的是很久很久才還，要還的會不會變多"], "dont": ["先別認定借錢一定要多還，聽聽看不同人怎麼說", "問完不用馬上評論他做得對不對，先把不同的說法收集起來"]}, "source": {"type": "research-derived", "citation": "Berti, A. E., & Bombi, A. S. (1988). The Child's Construction of Economics (G. Duveen, Trans.). Cambridge University Press. (Original work published in Italian, Florence, 1981)"}, "tags": ["thicken-12-s9", "金錢與選擇", "借與還", "利息雛形"], "language": "zh-Hant-TW"}, {"id": "LOG0000022", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "邏輯與謎題", "sub_category": "因果鏈：一路追問到底", "question_type": "行動題", "action_icon": "mouth", "question": "挑一件今天真的發生的小事，去找一個人，一起往回問「那這件事又是為什麼」，每答一次就再問一次。你們追到哪裡停下來了？", "parent": {"context": "12 歲的孩子開始能把一連串原因接成鏈子，而不只看眼前那一步。這張卡不是要找出「真正的原因」，是讓你和孩子體會：原因後面還有原因，一路追下去會通到很遠、甚至意外的地方，而「停在哪裡」本身就很值得聊。", "extensions": ["問問看：往回追的時候，有沒有哪一步其實接了好幾個原因，不只一個？", "聊聊：如果換一個人來追同一件事，他會在不同的地方停下來嗎？", "想一下：有沒有哪一條原因，追到後來又繞回了一開始那件事？"], "dont": ["別急著裁定哪個原因才是「對的」，重點是那條鏈子怎麼延伸。", "別在孩子停下來時說「還沒到呢」，停在哪裡是他自己的選擇。"]}, "source": {"type": "research-derived", "citation": "Inhelder, B., & Piaget, J. (1958). The Growth of Logical Thinking from Childhood to Adolescence: An Essay on the Construction of Formal Operational Structures (A. Parsons & S. Milgram, Trans.). New York: Basic Books."}, "tags": ["邏輯與謎題", "因果鏈", "推理", "thicken-12-s9"], "language": "zh-Hant-TW"}, {"id": "LOG0000023", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 12, "max": 12}, "category": "邏輯與謎題", "sub_category": "規律為什麼一定成立", "question_type": "沈思題", "action_icon": "star", "question": "任意挑兩個單數相加，答案好像總是雙數。你能不能在腦中想出一個理由，說明為什麼這不是巧合、而是一定會這樣？", "parent": {"context": "12 歲開始能從「我試了很多次都對」進到「我知道為什麼非這樣不可」，這是證明感的最初萌芽。這張卡不是要孩子背公式，是讓他體會「舉再多例子」和「給一個理由」之間那道有趣的門檻。", "extensions": ["想一下：試一百個例子都對，和能說出一個理由，這兩件事一樣嗎？", "換個規律試試：兩個雙數相加呢，理由會不會長得很像？", "想想看：如果有人說「可是我還沒試過所有數字」，你會怎麼回答他？"], "dont": ["別直接給出代數的標準寫法，孩子用自己的話講出來更珍貴。", "別評論他的理由「夠不夠嚴謹」，能感覺到「非這樣不可」就已經到位了。"]}, "source": {"type": "research-derived", "citation": "Inhelder, B., & Piaget, J. (1958). The Growth of Logical Thinking from Childhood to Adolescence: An Essay on the Construction of Formal Operational Structures (A. Parsons & S. Milgram, Trans.). New York: Basic Books. (French original: De la logique de l'enfant à la logique de l'adolescent, 1955)"}, "tags": ["邏輯與謎題", "證明感", "必然性", "thicken-12-s9"], "language": "zh-Hant-TW"}, {"id": "SPI0000026", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "靈性", "sub_category": "內在覺察——自由意志", "question_type": "沈思題", "action_icon": "star", "question": "剛剛冒出來的那個念頭，是「你」想出來的，還是它自己跑出來的？如果你沒辦法決定下一個念頭是什麼，那你以為的選擇，有多少真的是你選的？", "parent": {"context": "形式運思成熟的青少年開始能把「思考」當成觀察對象（後設認知）。這題碰到的是「自由意志 vs 決定論」這個古老問題——這兩種看法長久以來一直互相拉扯、沒有定論。目的不是要他得出「一切都是注定」或「我完全自由」的結論，兩端都是陷阱。讓他在「念頭從哪來」這個觀察裡卡住、來回，比給答案更重要。注意別把它推向命定論的虛無感，停在好奇就好。", "extensions": ["問他：你能不能現在『決定』接下來十秒鐘什麼都不想——試了之後發生什麼", "換個角度：就算念頭是自己冒出來的，你『要不要照它做』算不算一種選擇", "問他：法庭判一個人有罪，背後預設了人『可以選擇』。如果完全沒有自由意志，這件事還說得通嗎"], "dont": ["急著用腦科學或哲學名詞（決定論、自由意志）替他總結", "把它導向『所以努力沒用』這種無力的結論"]}, "source": {"type": "research-derived", "citation": "William James (1890) The Principles of Psychology, Henry Holt and Company — 第 IX 章「The Stream of Thought」與第 XI 章「Attention」對意識流、念頭浮現與意志的第一人稱內省。"}, "tags": ["thicken-1318-s10", "靈性", "內在覺察", "自由意志", "後設認知"], "language": "zh-Hant-TW"}, {"id": "SPI0000027", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "靈性", "sub_category": "東方智慧——無常與放手", "question_type": "行動題", "action_icon": "eye", "question": "挑一樣你覺得「一直都在、不會變」的東西——一個習慣、一段關係、一個你以為永遠不會改的想法。回去翻照片、問問家人，找出它其實早就在偷偷變的證據。", "parent": {"context": "青少年常把當下的狀態當成永恆——這段友情、這個自己、這個想法會一直這樣。這題用實際查證（翻舊照片、問長輩）讓他親眼撞見『一切都在變』，而不是被說教。〔執行前提〕需要能取得舊照片或可訪談的家人；若都沒有，plan B 是去觀察一棵樹或一條街道，找出它一年內變過的痕跡。目的是讓他體會『放下控制』不是放棄，而是看清有些事本來就不在你手上抓得住。", "extensions": ["問他：找到變化的證據時，心裡是鬆一口氣還是有點失落", "換個方向：如果一切都會變，那是不是反而讓現在這一刻更值得停下來看", "問他：『放下控制』跟『擺爛不管』差在哪——你能不能舉一件自己分得出來的例子"], "dont": ["把它講成『所以不要太投入、反正都會變』的消極態度", "替他下『無常所以要看開』這種結論"]}, "source": {"type": "research-derived", "citation": "Hay, D., & Nye, R. (2006). The Spirit of the Child (Revised Edition). London: Jessica Kingsley Publishers. — 關係性覺察（relational consciousness）：awareness sensing 的「here-and-now / flow」面向（兒童透過具體生活經驗的當下覺察）"}, "tags": ["thicken-1318-s10", "靈性", "東方智慧", "無常", "放手", "查證"], "language": "zh-Hant-TW"}, {"id": "LNG0000026", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "語文", "sub_category": "說不出口的：語言的邊界", "question_type": "沈思題", "action_icon": "star", "question": "有些感受，你心裡很清楚，卻怎麼也找不到一個詞說準它。那份說不出口的，是因為語言不夠用，還是它本來就不適合被說成話？", "parent": {"context": "青少年常會遇到一種狀態：明明感覺很真實，話一出口卻整個走樣，或乾脆說不出來。這張卡想邀請你停在那個「卡住」的地方，不急著找答案，而是去想語言和感受之間到底是什麼關係——有時沉默、停頓、一個眼神，可能比任何詞都更接近你想表達的。問的不是「你該怎麼講清楚」，而是「有些東西是不是注定講不清楚，而那也沒關係」。", "extensions": ["回想一個你曾經很想說、卻發現沒有合適的詞的時刻，那時你最後是怎麼讓對方知道的。", "如果有一種感受在某個語言裡有專門的詞、在你的語言裡卻沒有，這會不會影響你有沒有注意到自己正在感受它。", "想想沉默在不同情境下說了什麼：尷尬的沉默、安心的沉默、生氣的沉默，它們真的都是「沒說話」嗎。"], "dont": ["別急著認定「只要詞彙量夠大就什麼都能說清楚」，那會把這個問題提早關掉。", "別把它變成一個要寫出標準定義的作業，這張卡沒有要你交出正確答案。"]}, "source": {"type": "research-derived", "citation": "Gombert, Jean Émile (1992). Metalinguistic Development. Chicago: University of Chicago Press."}, "tags": ["thicken-1318-s10", "語文", "13-18", "後設語言", "沈思題"], "language": "zh-Hant-TW"}, {"id": "LNG0000027", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "語文", "sub_category": "文字與真實：寫下來就比較可信嗎", "question_type": "行動題", "action_icon": "mouth", "question": "找三個人問問看：當一句話是「印出來的」或「寫在螢幕上的」，他們會不會比聽人隨口說更相信它？再回頭看看你自己是不是也這樣。", "parent": {"context": "很多人對白紙黑字、印刷品、看起來正式的文字，會不自覺多給一分信任，好像「寫下來」本身就是一種證明。這張卡邀請你帶著這個問題去問身邊的人，聽聽他們怎麼判斷一句話可不可信，再對照自己的習慣。重點不是要證明誰對誰錯，而是去觀察「形式」如何悄悄影響我們對「真實」的判斷。〔執行前提〕若一時找不到三個人，問兩個也可以，或改成觀察：在社群、廣告、課本上找一句你差點就相信、只因為它「看起來很正式」的話。", "extensions": ["把你問到的回答排一排，看看大家是用內容判斷，還是用「在哪裡看到、長什麼樣子」判斷。", "找一句同樣的話，分別出現在隨手的訊息和正式的文件裡，留意自己的相信程度有沒有不一樣。", "想想為什麼人類會發展出「寫下來=比較算數」的習慣，這個習慣在什麼時候反而會被利用。"], "dont": ["別把這當成抓別人「太好騙」的測驗，你問的是大家怎麼判斷，不是評分。", "別預設「寫下來的一定不可信」當作新答案，那只是換一個立場照單全收。"]}, "source": {"type": "research-derived", "citation": "Gombert, J.-É. (1992). Metalinguistic Development (T. Pownall, Trans.). Chicago: University of Chicago Press. 參見「Metalinguistic development and written language」一章（探討讀寫脈絡下對語言書面形式與功能的後設反思）。"}, "tags": ["thicken-1318-s10", "語文", "13-18", "認識論", "行動題"], "language": "zh-Hant-TW"}, {"id": "LOC0000026", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "本土文化", "sub_category": "傳統的去留", "question_type": "沈思題", "action_icon": "heart", "question": "你家有一個你不太想跟著做的傳統嗎，像某種拜拜、某句一定要講的話、某天一定要回去的場合。如果有一天這個傳統由你決定要不要留下，光想到「留」跟「放」，你心裡的感覺哪裡不一樣。", "parent": {"context": "到了十幾歲，傳統不再只是「家裡規定」，而開始是「我要不要接手」的問題。傳統承載的常不是規則本身，而是某個人、某段關係、某種被記得的方式——所以「放掉」有時不只是放掉一件事。這題不要孩子表態留或放，只邀請他去感覺「留」與「放」在心裡掀起的不同重量。沒有哪個選擇比較成熟、比較孝順，也沒有標準答案。〔執行前提〕這題碰到「放掉一個傳統可能等於放掉某個人或某段關係」的重量，家長先讀背面、挑孩子情緒平穩時聊；孩子若不想談，隨時可以擱著，不必當下給答案。", "extensions": ["「留」的那股感覺，比較像捨不得某個人，還是捨不得那件事本身", "換個方向想：有沒有哪個傳統，是你其實希望它一直在的", "如果你以後有了自己的家，這個傳統會用什麼樣子繼續，還是換成別的"], "dont": ["暗示「傳統一定要傳下去才對」或「該斷就斷」其中一邊", "把它變成要他現在就向長輩宣布決定"]}, "source": {"type": "research-derived", "citation": "Hall, S. (1990). Cultural Identity and Diaspora. In J. Rutherford (Ed.), Identity: Community, Culture, Difference (pp. 222-237). London: Lawrence & Wishart."}, "tags": ["thicken-1318-s10", "本土文化", "13-18", "傳統的去留"], "language": "zh-Hant-TW"}, {"id": "LOC0000027", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "本土文化", "sub_category": "借用與尊重", "question_type": "行動題", "action_icon": "mouth", "question": "找一個把別的文化符號用在身上的東西——衣服上的圖騰、店家借用的神明形象、節慶被拿來促銷。問兩個立場不同的人：什麼時候算欣賞、什麼時候算冒犯，界線在哪。把兩種說法都帶回來。", "parent": {"context": "〔執行前提〕若身邊難找到願意談的兩個人，plan B 是各找一則網路上立場相反的留言或文章替代，重點是真的並陳兩種聲音、而不是只聽一邊。文化的借用是個沒有公認答案的爭論：同一個符號，有人覺得是被看見、有人覺得是被拿走。十幾歲的孩子能開始處理「界線由誰來畫、用什麼標準畫」這種認識論問題。這題不要他選出正確答案，而是讓他發現界線本身是被不同的人、用不同理由協商出來的。", "extensions": ["兩個人畫界線時，各自最在意的是什麼？把他們真正在乎的那一點聽出來。", "同一個符號，換成是你自己家的文化被別人這樣用，感覺會不會不一樣", "有沒有一種用法，兩邊都同意是 OK 的——它有什麼共同點"], "dont": ["先告訴他「這樣就是文化挪用」或「想太多」其中一種定論", "只採訪跟他想法一樣的人，讓兩種聲音變成一種"]}, "source": {"type": "research-derived", "citation": "Anderson, Benedict (1983). Imagined Communities: Reflections on the Origin and Spread of Nationalism. London: Verso."}, "tags": ["thicken-1318-s10", "本土文化", "13-18", "借用與尊重"], "language": "zh-Hant-TW"}, {"id": "NAT0000024", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "自然與宇宙", "sub_category": "隨機與必然", "question_type": "沈思題", "action_icon": "star", "question": "如果有人能知道此刻每一個粒子的位置和動向，他就能算出明天會發生的一切嗎？還是說，宇宙裡有些事連神也擲了骰子才知道？", "parent": {"context": "形式運思成熟的年紀，開始能把「決定論」和「真正的隨機」當成可以拿來掂量的兩種世界圖像。這題不是要你選哪個是對的——物理學自己都還在這條線上拉扯。它邀請你想：如果一切早就注定，那「選擇」是什麼？如果真有隨機，那「原因」又是什麼？讓問題停在你心裡，比急著有答案更有意思。", "extensions": ["想想擲一顆骰子：結果是早就藏在你手的力道、桌面、空氣裡，只是太複雜算不出來？還是骰子落下前，結果根本還不存在？", "如果未來完全注定，你今天做的決定還算不算「你」做的？這會改變你怎麼看一次選擇嗎？", "「我們無法預測」和「它本來就沒被決定」是同一件事嗎，還是兩種完全不同的說法？"], "dont": ["別急著查「量子力學到底證明了什麼」就收手——先讓自己的直覺和它打一架，查到的東西才接得住。", "別把這題化簡成「要嘛全注定、要嘛全隨機」二選一；很多想法落在兩者之間。"]}, "source": {"type": "research-derived", "citation": "Carl Sagan (1980)《Cosmos》，第 2 章〈One Voice in the Cosmic Fugue〉— 機運（隨機突變、偶然事件）與必然（物理規律、天擇）在宇宙與生命演化中交織的角色"}, "tags": ["thicken-1318-s10", "隨機與必然", "認識論", "13-18", "沈思題"], "language": "zh-Hant-TW"}, {"id": "NAT0000025", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "自然與宇宙", "sub_category": "人算不算自然的一部分", "question_type": "行動題", "action_icon": "mouth", "question": "去問三個不同年紀的人：一座城市、一支手機、一條人造運河，算不算「自然」的一部分？聽聽他們把界線畫在哪裡，又為什麼畫在那裡。", "parent": {"context": "我們很習慣把「自然」和「人造」分成兩邊。但這條線其實很難畫——有人覺得海狸築壩、白蟻造丘是自然，人蓋的城市卻不是；也有人覺得人也是這顆星球長出來的生物，蓋的東西沒道理被排除。這題沒有標準答案，它想讓你發現：每個人心裡那條界線畫得很不一樣，而那條線怎麼畫，會悄悄影響我們怎麼對待這個世界。〔執行前提〕找三個年紀差距大的人最好；若不方便當面問，用訊息問或聽他們平常聊到時留意也行。", "extensions": ["注意有沒有人說「自然=沒有人插手的」——那地球上還剩多少地方算數？這個定義站得住嗎？", "如果蜜蜂的巢是自然的，人的房子為什麼常被排除在外？差別是「複雜」、是「破壞」、還是別的？", "問完之後想想：把人放進「自然之內」還是「自然之外」，會讓你對污染、保育這些事的看法有什麼不同？"], "dont": ["別預設「人就是在破壞自然」當前提去引導對方——這題要收集的是不同的畫線方式，不是說服。", "別只問跟你想法一樣的人；找個你猜會跟你不同的人問，收穫更大。"]}, "source": {"type": "research-derived", "citation": "David Christian, Maps of Time: An Introduction to Big History (Berkeley: University of California Press, 2004)."}, "tags": ["thicken-1318-s10", "人算不算自然的一部分", "系統思考", "13-18", "行動題"], "language": "zh-Hant-TW"}, {"id": "SOC0000024", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "人與社會", "sub_category": "自由與責任", "question_type": "沈思題", "action_icon": "star", "question": "你的自由可以做到哪裡為止，別人的自由又從哪裡開始？想一個你和別人的自由剛好撞在一起的情況。", "parent": {"context": "十幾歲是開始大幅爭取自主的階段：晚回家、選自己的路、用自己的方式表達。這題不是要替孩子畫一條線，而是邀他想像「自由」其實是很多人的自由互相交疊，邊界往往出現在彼此重疊的地方。讓他在腦中跑一個具體場景，比抽象地談「自由很重要」更能長出多角度的思考。", "extensions": ["問他：那條界線是誰定的？是法律、是大家的默契，還是當下兩個人協調出來的？", "換個角度想：如果是對方來說這件事，他會怎麼描述那條界線？", "再想一層：有沒有一種情況，限制某個人的自由，反而是為了保護更多人的自由？"], "dont": ["別急著給他一句『你的自由不能妨礙別人』就收尾，那會把開放的思考壓成一條規則。", "別把它導向某個立場或某個社會議題的標準答案，只陪他看清張力本身。"]}, "source": {"type": "research-derived", "citation": "Lawrence Kohlberg (1981) The Philosophy of Moral Development: Moral Stages and the Idea of Justice (Essays on Moral Development, Vol. 1), Harper & Row"}, "tags": ["人與社會", "13-18", "自由與責任", "沈思題", "thicken-1318-s10"], "language": "zh-Hant-TW"}, {"id": "SOC0000025", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "人與社會", "sub_category": "進步是什麼", "question_type": "行動題", "action_icon": "mouth", "question": "找三個不同年紀或不同處境的人，分別問他們：你覺得這個社會這些年是變好還是變壞，你用什麼來判斷？", "parent": {"context": "「社會在進步」常被當成理所當然，但用什麼衡量、由誰說了算，其實人人不同：有人看經濟，有人看治安，有人看人和人之間的對待。〔執行前提〕需要孩子主動開口問人；若一時找不到三個願意聊的人，plan B 是先問家裡能接觸到的兩個人，再加一個線上看到的不同世代說法，把蒐集到的判斷標準擺在一起對照。重點不在誰對，而在看見『變好』本身就有好幾把不同的尺。", "extensions": ["把每個人用來判斷的『那把尺』寫下來，看看彼此差在哪裡。", "問他自己：如果用其中一把尺，社會是進步的；換另一把尺，結論會不會相反？", "再想：有沒有哪一群人的感受，在這些尺裡常常被漏掉、量不到？"], "dont": ["別預設『進步』有一個正確定義，然後拿訪談去驗證它，那會錯過真正的分歧。", "別把訪談變成說服別人接受某種立場，只是去聽他們怎麼判斷。"]}, "source": {"type": "research-derived", "citation": "Robert L. Selman (1980). The Growth of Interpersonal Understanding: Developmental and Clinical Analyses. New York: Academic Press."}, "tags": ["人與社會", "13-18", "進步是什麼", "行動題", "thicken-1318-s10"], "language": "zh-Hant-TW"}, {"id": "MAK0000024", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "動手與感官", "sub_category": "工具改變了人", "question_type": "沈思題", "action_icon": "star", "question": "想一個讓人做到以前做不到的事的工具或技術，從刀到手機都算。它替人開了一扇門，同時可能也讓人失去了某種本來會的本事——你覺得那是什麼？", "parent": {"context": "形式運思期的青少年能把單一工具放回更大的系統裡看，權衡得與失，而不只問好不好用。這題不要正解：每個工具都是雙面的，重點是讓孩子自己權衡，而不是斷定科技是好是壞。很多技術帶來能力的同時也讓某些技能變得少用，這是觀察而非定論，談的時候用「可能」「有些人覺得」這類誠實的限定，不暗示哪一邊才對。", "extensions": ["可以從一個很近的工具開始：計算機讓人算更大的數，但有些人覺得心算變慢了——這算失去嗎，還是只是換了一種能力？", "同一個工具對不同人得失不同。對需要它的人是解放，對另一些人可能是依賴，誰得多誰失多？", "把時間拉長：被一個工具取代的本事，是真的消失了，還是轉移到別處、變成另一種樣子？"], "dont": ["不必逼孩子在『科技好』和『科技壞』之間選一邊，雙面並存本身就是答案。", "別把這題導向『所以要少用手機』的結論，那會把開放的思辨收成一句訓話。"]}, "source": {"type": "research-derived", "citation": "Donald A. Norman (2013). The Design of Everyday Things: Revised and Expanded Edition. New York: Basic Books."}, "tags": ["thicken-1318-s10", "動手與感官", "13-18", "工具與人", "認識論"], "language": "zh-Hant-TW"}, {"id": "MAK0000025", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "動手與感官", "sub_category": "原創與模仿", "question_type": "行動題", "action_icon": "hand", "question": "挑一樣你想學會做的東西，先照著別人的做法做一遍，再做第二遍時刻意改掉一處你想改的地方。做完問問會做這件事的人：學到哪裡開始，才算是你自己的？", "parent": {"context": "幾乎所有手藝都從模仿入門，這題讓青少年親手走過『照做—改動』這段路，再把抽象的原創問題交給有經驗的人對話。〔執行前提〕需要一樣可動手做、且找得到人請教的事（摺紙、料理、彈一段曲子、寫字都行）；若一時找不到人，plan B 是先自己做完兩遍，把『哪一處改動讓它變成我的』寫下來，下次遇到會的人再問。這題沒有標準答案：原創與模仿的界線本來就模糊，每個領域、每個人的看法都不同。", "extensions": ["照著做的那一遍，你完全聽話嗎，還是已經不知不覺改了某些地方？那算模仿還是已經開始原創？", "問到的人可能說『改一點點就算』，也可能說『要全部自己想才算』——他們為什麼這樣分？", "如果你改的那一處後來大家都跟著學，它對下一個人來說，又變回『別人的做法』了嗎？"], "dont": ["別替孩子定義幾分原創才算數，讓他和懂行的人在對話裡自己磨出界線。", "不要把『模仿』講成不好的、要趕快擺脫的階段，多數手藝正是從踏實照做開始的。"]}, "source": {"type": "research-derived", "citation": "Richard Sennett (2008). The Craftsman. New Haven & London: Yale University Press."}, "tags": ["thicken-1318-s10", "動手與感官", "13-18", "原創與模仿", "技藝養成"], "language": "zh-Hant-TW"}, {"id": "BOD0000024", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "身體與健康", "sub_category": "健康是什麼", "question_type": "沈思題", "action_icon": "star", "question": "「沒生病」就等於「健康」嗎？如果要你替自己定義什麼叫對自己好，你會把哪些東西放進去，又會把哪些常被當成健康的標準拿出來？", "parent": {"context": "青少年常被各種外部標準包圍——數值、體能表現、別人的評論——彷彿健康就是達標或不出問題。世界衛生組織很早就把健康描述成一種身體、心理與社會層面的整體安好，而不只是沒有疾病；但這仍只是一種說法，不是標準答案。這張卡邀請孩子做的是一件思辨的事：自己去界定「對我好」這件事，意識到定義本身是可以由他來下的。重點不是得出一份正確清單，而是讓他發現健康是一個會隨人、隨處境而不同的開放概念。", "extensions": ["你的定義裡，有沒有哪一項其實是別人替你決定、你只是接收下來的？", "同樣一件事，對運動員、對老人、對嬰兒來說算不算健康，可能一樣嗎？", "如果健康會隨年齡和處境改變，那有沒有一個版本是永遠通用的？"], "dont": ["別把孩子的定義拿去糾正或補上「你漏了運動、飲食」，那會把思辨變回背標準答案。", "別把這題導向體重、身材或某個具體數字，焦點是他怎麼定義好，不是他現在好不好。"]}, "source": {"type": "research-derived", "citation": "World Health Organization. (1948). Constitution of the World Health Organization (Preamble). Geneva: WHO. [簽署於 1946-07-22，1948-04-07 生效]"}, "tags": ["thicken-1318-s10", "身體與健康", "健康是什麼", "認識論", "agency"], "language": "zh-Hant-TW"}, {"id": "BOD0000025", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "身體與健康", "sub_category": "身體的訊號與界線", "question_type": "行動題", "action_icon": "mouth", "question": "累、痛、不舒服——有人說這是身體在跟你傳話，但要不要理會、什麼時候理會，每個人不一樣。去問問身邊幾個不同的人：他們什麼時候會聽身體的、什麼時候硬撐過去，又是怎麼決定的？", "parent": {"context": "疲倦、疼痛、不適往往是身體傳出的訊息，但人們要不要理會、何時理會，深受習慣、文化和處境影響——有人從小被教「忍一忍就過去」，有人則學會停下來。這張卡邀請孩子用發問去蒐集不同人的真實做法，看見「聽不聽身體」其實沒有單一正解，是一連串權衡。〔執行前提〕只問對方願意分享的一般情況，不追問病痛隱私或診斷；若身邊不易開口，可改問家人或用文字訊息問，都算完成。", "extensions": ["把大家的回答排一排，有沒有哪一種情況幾乎所有人都會選擇硬撐，為什麼？", "同一個訊號（例如很累），在不同人那裡被解讀成的意思一樣嗎？", "回頭看你自己最近一次忽略身體訊號，當時是什麼讓你決定不聽？"], "dont": ["別把訪談結果評成誰對誰錯，或得出「就是要多休息」這種結論，那會蓋掉孩子聽到的差異。", "別追問對方的病史、用藥或具體診斷，這題問的是怎麼決定要不要聽，不是健康狀況本身。"]}, "source": {"type": "research-derived", "citation": "Robert M. Sapolsky (2004). Why Zebras Don't Get Ulcers: An Updated Guide to Stress, Stress-Related Diseases, and Coping (3rd ed.). New York: Holt Paperbacks (Henry Holt and Company)."}, "tags": ["thicken-1318-s10", "身體與健康", "身體的訊號與界線", "訪談他人", "agency"], "language": "zh-Hant-TW"}, {"id": "MON0000024", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "金錢與選擇", "sub_category": "錢與自由", "question_type": "沈思題", "action_icon": "star", "question": "錢能買到一些選擇的自由，可是有些選擇一旦做了，反而把你綁得更緊。哪一種自由，是你寧可少一點錢也想留住的？", "parent": {"context": "到了能自己支配一些錢的年紀，「自由」常被等同於「想買什麼就買什麼」。但自由有兩面：錢打開的門，和錢關上的門。一份高薪工作可能買到旅行的自由，卻綁住你的時間；一筆貸款買到現在的房子，卻綁住你未來十年的選擇。這題不要你算哪個划算，而是邀請你看見：你心裡真正想保護的自由是哪一種，以及你願意拿什麼去換。沒有正確答案，每個人珍惜的自由本來就不一樣。", "extensions": ["可以想想：有沒有一種「不花錢」反而帶來的自由，是用錢買不到的？", "如果同一筆錢，一種花法給你眼前的自由、一種花法給你未來的自由，你怎麼看這兩種自由的差別？", "別人眼中「綁住你」的選擇，會不會在你自己看來其實是一種踏實？"], "dont": ["別急著替孩子定義什麼叫真正的自由，那是他要自己摸索的。", "別把這題導向「所以要存錢/所以別亂花」的結論，那會關掉思考。"]}, "source": {"type": "research-derived", "citation": "Daniel Kahneman (2011) Thinking, Fast and Slow, Farrar, Straus and Giroux — 損失趨避與選擇的框架效應"}, "tags": ["thicken-1318-s10", "錢與選擇", "13-18", "認識論", "價值權衡"], "language": "zh-Hant-TW"}, {"id": "MON0000025", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "金錢與選擇", "sub_category": "消費與身分", "question_type": "行動題", "action_icon": "mouth", "question": "去問三個不同年紀的人：有沒有哪件他們買的東西，後來變成了別人認得他們的一部分？再問他們，當初是不是為了這個才買的。", "parent": {"context": "我們買的東西常常不只是東西。一雙鞋、一支手機、一個牌子，有時會被別人讀成「你是誰」。但這層意義是後來長出來的，還是當初就刻意挑的？這題請你離開卡片，去訪談不同年紀的人，蒐集真實的說法，而不是憑印象猜。你會發現有人是先有身分才去買、有人是買了之後才被貼上標籤、也有人完全不在意。〔執行前提〕若一時找不到三個人可問，先問家裡兩位長輩，再上網看一兩則別人談「為什麼買某樣東西」的分享補上。", "extensions": ["比較三個人的答案：「東西定義人」這件事，在不同世代是不是有不同的力道？", "問問看：有沒有人刻意「不買某樣大家都有的東西」，那也是一種表達自己是誰嗎？", "回頭看自己：你身上有沒有一件東西，別人靠它來認得你，而你其實沒那樣想過？"], "dont": ["別把訪談變成評判別人「太愛慕虛榮」，這題是聽，不是打分數。", "別替受訪的人總結出一個「正確的消費觀」，讓他們的原話保持原樣。"]}, "source": {"type": "research-derived", "citation": "Russell W. Belk (1988) Possessions and the Extended Self, Journal of Consumer Research 15(2): 139-168 — 人會把擁有物納入自我感、並被他人用來辨識「你是誰」。"}, "tags": ["thicken-1318-s10", "錢與選擇", "13-18", "行動訪談", "消費與身分"], "language": "zh-Hant-TW"}, {"id": "LOG0000024", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "邏輯與謎題", "sub_category": "定義的邊界", "question_type": "沈思題", "action_icon": "star", "question": "一堆沙拿掉一粒還是一堆，那一直拿到剩幾粒時它不再是「一堆」？你說得出那條界線在哪一粒嗎？", "parent": {"context": "很多日常的詞其實沒有清楚的邊界——一堆、年輕、高、冷。每一小步都看不出差別，可是兩端明明不一樣。這張卡邀請你停在那個模糊地帶，看看「我們其實是怎麼用詞的」，而不是急著找出正確答案。沒有哪一粒是正解，連「根本沒有界線」也是一種值得想的回答。", "extensions": ["如果界線根本不存在，那我們平常說「這是一堆」的時候，到底在說什麼？", "換一個模糊的詞試試——從幾歲開始不算小孩？是不是同樣畫不出那一條線？", "如果三個人對界線的答案都不同，他們有誰是錯的嗎，還是這個問題本來就沒有錯不錯？"], "dont": ["別急著規定一個數字（例如「少於十粒就不算」），先待在說不清的地方多想一會兒。", "別把它變成查字典——字典的定義也躲不開這個模糊，自己想反而更有意思。"]}, "source": {"type": "research-derived", "citation": "Irving M. Copi, Carl Cohen & Kenneth McMahon, Introduction to Logic (Routledge/Pearson, 初版 1953) — 模糊詞項與滑坡/連續體謬誤(sorites「堆」悖論)"}, "tags": ["thicken-1318-s10", "定義的邊界", "悖論", "13-18", "沈思題"], "language": "zh-Hant-TW"}, {"id": "LOG0000025", "version": 1, "date_added": "2026-06-29", "age_range": {"min": 13, "max": 18}, "category": "邏輯與謎題", "sub_category": "合作或背叛", "question_type": "行動題", "action_icon": "mouth", "question": "找一個人玩這個局：你們各自偷偷決定要「合作」或「背叛」，兩個都合作各得三分，都背叛各得一分，一個背叛一個合作的背叛者拿五分、合作者拿零分；玩幾輪後問問彼此當時在想什麼。", "parent": {"context": "〔執行前提〕需要一個願意陪你玩幾輪的人（家人、朋友皆可），準備紙筆記分；找不到人時的 plan B 是把自己分成「現在的你」和「等一下回頭看的你」各做一次選擇再對照。這個局沒有正確下法——每次選擇背後，藏著你怎麼看對方、怎麼預測對方看你。重點不是誰分數高，是玩完後那段「你剛才為什麼這樣選」的對話。", "extensions": ["如果只玩一輪和要玩很多輪，你的選法會不會不一樣？為什麼次數會改變人的算盤？", "對方背叛過你一次之後，下一輪你怎麼決定——報復、原諒、還是試探？", "如果你們玩前可以先說好策略但不一定要遵守，這個「說好」還有意義嗎？"], "dont": ["別在開玩前就先講好「我們都合作」當成標準答案，那樣就看不到真正的選擇是怎麼長出來的。", "別把輸贏當重點吵起來，分數只是讓選擇有重量，玩完的對話才是這張卡要的。"]}, "source": {"type": "research-derived", "citation": "Robert Axelrod (1984) The Evolution of Cooperation, Basic Books — 重複賽局中合作與背叛的策略選擇（囚徒困境）。"}, "tags": ["thicken-1318-s10", "合作或背叛", "賽局", "13-18", "行動題"], "language": "zh-Hant-TW"}];</script>

      R('button', { onClick: props.onChangeAge, style: { fontSize: 12, color: '#fff', background: dir.age9, padding: '5px 14px', borderRadius: 999, border: 'none', cursor: 'pointer', letterSpacing: '0.05em' } }, props.age + ' 歲 ▾')
    ),

    (props.cards.length === 0
      ? R('div', { style: { maxWidth: 560, margin: '64px auto', textAlign: 'center', fontFamily: F.ming, color: dir.paperInkSoft, lineHeight: 1.9 } },
          R('div', { style: { fontSize: 32, color: dir.gold, marginBottom: 16 } }, '✦'),
          R('div', { style: { fontSize: 15, color: dir.paperInk } }, props.age + ' 歲暫時抽不到題目。'),
          R('div', { style: { fontSize: 13, marginTop: 6 } }, '點右上角換一個年齡試試。')
        )
      : R(React.Fragment, null,
          R('div', { style: { display: 'flex', flexDirection: isMobile ? 'column' : 'row', gap: 20, justifyContent: 'center', alignItems: 'center', maxWidth: 920, margin: '0 auto', flexWrap: 'wrap' } },
            props.cards.map(function (c, i) {
              var scale = isMobile ? 0.7 : 0.7;
              // CardFlip 現在是「卡片 564 + gap 16 + 翻面按鈕 ~44」的直向堆疊，故 wrapper 高度要含按鈕列。
              var flipH = 564 + 16 + 44;
              return R('div', { key: c.id + '-' + i, style: { width: 400 * scale, height: flipH * scale, overflow: 'hidden' } },
                R('div', { style: { transform: 'scale(' + scale + ')', transformOrigin: 'top left' } },
                  R(window.CardFlip, { card: c })
                )
              );
            })
          ),
          R('div', { style: { textAlign: 'center', marginTop: 24 } },
            R('button', { onClick: reshuffle, style: { background: '#1B2A4E', color: dir.gold, padding: '12px 32px', borderRadius: 999, border: 'none', fontFamily: 'Cormorant Garamond, serif', fontStyle: 'italic', fontSize: 14, letterSpacing: '0.2em', cursor: 'pointer' } }, '↻ 再抽兩張')
          )
        ))
  );
};

window._toV6 = function (q) {
  var iconMap = { eye: 'eye', ear: 'ear', hand: 'hand', mouth: 'mouth', heart: 'heart', star: 'star' };
  var cat = q.category;
  var seq = q.id.substring(3);
  var shelf = parseInt(seq, 10).toString().padStart(3, '0');
  var shortCat = { '靈性':'靈性', '語文':'語文', '客製興趣': (q.sub_category || '客製').split(' ')[0], '本土文化':'本土', '自然與宇宙':'自然', '人與社會':'人社', '動手與感官':'動手', '身體與健康':'身心', '金錢與選擇':'金錢', '邏輯與謎題':'邏輯', '共讀卡':'共讀' }[cat] || cat;
  var age = q.age_range.min + ' 歲';
  return {
    age: age,
    category: cat === '客製興趣' ? (q.sub_category || '').split(' ')[0] || '客製' : cat,
    callno: shortCat + ' · ' + shelf,
    action: iconMap[q.action_icon] || 'star',
    question: q.question,
    back: {
      context: q.parent.context,
      extensions: q.parent.extensions || [],
      dont: Array.isArray(q.parent.dont) ? q.parent.dont.join('；') : (q.parent.dont || ''),
      notes: '觀察小記',
    },
  };
};

window._toCoRead = function (q) {
  var seq = q.id.substring(3);
  var shelf = parseInt(seq, 10).toString().padStart(3, '0');
  return {
    name: q.sub_category || '共讀',
    callno: '共讀 · ' + shelf,
    question: q.question,
    back: {
      nine: q.parent.nine || '（待補：預期 9 歲會怎麼切入）',
      twelve: q.parent.twelve || '（待補：預期 12 歲會怎麼切入）',
      space: q.parent.space || '（待補：要保護的對話空間）',
      dont: Array.isArray(q.parent.dont) ? q.parent.dont.join('；') : (q.parent.dont || ''),
    },
  };
};
</script>
<script>
function App() {
  var R = React.createElement;
  var [age, setAge] = React.useState(null);
  var [cards, setCards] = React.useState(null);

  if (age === null) {
    return R(window.StartScreen, { onStart: function (a) { setAge(a); setCards(null); } });
  }
  return R(window.MainScreen, {
    age: age,
    cards: cards,
    onReshuffle: function (newCards) { setCards(newCards); },
    onChangeAge: function () { setAge(null); setCards(null); },
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
